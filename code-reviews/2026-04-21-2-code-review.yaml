      pattern: "Effect.gen composition"

    - title: "Idempotent execution"
      severity: info
      description: "Migration runner reads and executes SQL files in order, compatible with CREATE TABLE IF NOT EXISTS pattern"

    - title: "File-based migrations"
      severity: info
      description: "Migrations loaded from ./migrations/*.sql using Node.js fs with proper error handling via Effect.tryPromise"

testing:
