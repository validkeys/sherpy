  categories:
    - category: "1. Authentication (Okta PKCE)"
      status: "✅ PASS"
      findings:
        - item: "Okta PKCE flow implemented correctly"
          status: "✅ PASS"
          location: "packages/web/src/lib/auth.ts:8-18"
          details: |
            - PKCE enabled explicitly with `pkce: true`
            - No client secret in configuration (correct for SPA)
            - Using standard Okta OIDC scopes: openid, profile, email
          code_snippet: |
            export const authClient = new OktaAuth({
              issuer: import.meta.env.VITE_OKTA_DOMAIN || "",
              clientId: import.meta.env.VITE_OKTA_CLIENT_ID || "",
              redirectUri: `${window.location.origin}/login/callback`,
              postLogoutRedirectUri: window.location.origin,
              scopes: ["openid", "profile", "email"],
              pkce: true,
              tokenManager: {
                storage: "sessionStorage",
              },
            });

        - item: "Tokens stored in session storage only"
          status: "✅ PASS"
          location: "packages/web/src/lib/auth.ts:15-17"
          details: |
            - tokenManager configured to use sessionStorage (not localStorage)
            - This prevents token persistence across browser sessions
            - Aligns with security best practices for SPAs

        - item: "Auth token injected on all API requests"
          status: "✅ PASS"
          location: "packages/web/src/lib/api-client.ts:40-52"
          details: |
            - All requests call getToken() before making HTTP calls
            - Bearer token added to Authorization header
            - 401 thrown if token unavailable
          code_snippet: |
            private async request<TRes>(method: string, endpoint: string, body?: unknown): Promise<TRes> {
              const token = await this.getToken();
              if (!token) {
                throw new ApiError(401, "No authentication token available");
              }
              const options: RequestInit = {
                method,
                headers: {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${token}`,
                },
              };
              // ...
            }

        - item: "Auth token injected on WebSocket connections"
          status: "✅ PASS"
          location: "packages/web/src/lib/ws-client.ts:45-63"
          details: |
            - Token fetched before WebSocket connection
            - JWT sent as first message after connection opens
            - Connection fails gracefully if token unavailable
          code_snippet: |
            async connect(): Promise<void> {
              const token = await this.getToken();
              if (!token) {
                throw new Error("No authentication token available");
              }
              this.ws = new WebSocket(this.url);
              this.ws.onopen = () => {
                // Send JWT as first message for authentication
                this.ws?.send(JSON.stringify({ type: "auth", token }));
                this.connectionState = "connected";
                this.reconnectAttempts = 0;
                this.notifyStateChange();
              };
            }

        - item: "Unauthenticated users redirect to login"
          status: "✅ PASS"
          location: "packages/web/src/components/auth/protected-route.tsx:22-24"
          details: |
            - ProtectedRoute component checks authentication state
            - Redirects to /login if not authenticated
            - Shows loading spinner while auth state is initializing

        - item: "Token refresh handled automatically"
          status: "✅ PASS"
          location: "packages/web/src/components/auth/auth-provider.tsx:76"
          details: |
            - Subscribes to Okta authStateManager for token updates
            - Automatically updates access token when Okta refreshes it
            - Token manager handles refresh logic internally

        - item: "Dev mode bypass for local development"
          status: "✅ ACCEPTABLE"
          location: "packages/web/src/components/auth/auth-provider.tsx:20-46"
          details: |
            - VITE_DEV_MODE flag allows skipping Okta authentication
            - Mock user and token provided for development
            - Clearly logged in console when dev mode is active
            - Should NOT be enabled in production

