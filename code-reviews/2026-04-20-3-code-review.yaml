# 1. SECURITY REVIEW

## ✅ Server binds to 127.0.0.1 only
**Status:** PASS
**Evidence:**
- HTTP server: `packages/api/src/server.ts:271`
  ```typescript
  NodeHttpServer.layer(createServer, { port: 3100, host: "127.0.0.1" })
  ```
- WebSocket server: `packages/api/src/server.ts:171`
  ```typescript
  new WebSocketServer({ port: 3101, host: "127.0.0.1" })
  ```
**Verdict:** Both services correctly bind to localhost only, preventing external access.

## ⚠️  JWT validation uses JWKS, not hardcoded keys
**Status:** PARTIAL - TODO present
**Evidence:**
- JWKS fetching implemented: `packages/api/src/auth/jwks-cache.ts:61-89`
- Cache with 1-hour TTL correctly implemented
- **TODO at line 96:** "Actual JWT signature verification" not yet implemented
- Currently only validates format, expiration, issuer, and audience
- Does not verify cryptographic signature against JWKS public keys

**Impact:** Medium severity - authentication is not cryptographically secure
**Recommendation:**
1. Add `jose` or `jsonwebtoken` library for signature verification
2. Use fetched JWKS keys to verify JWT signatures
3. Priority: High - should be completed before production deployment

**Files affected:**
- `packages/api/src/auth/jwks-cache.ts:91-152`

