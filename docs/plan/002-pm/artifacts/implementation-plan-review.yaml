issues:
  critical: []

  warnings:
    - id: WARN-001
      category: best_practices
      description: "File path conflict: m6-006 creates packages/api/src/api/routes/chat.ts which m3-011 already created."
      location: "milestone-m6.tasks.yaml: m6-006"
      recommendation: "RESOLVED: m6-006 now lists chat.ts under 'modify' instead of 'create'. Instructions clarify it extends routes from m3-011 and ChatService works alongside ChatSessionService from m3-008."
      status: resolved

    - id: WARN-002
      category: style_anchors
      description: "Frontend milestones m5/m6 had zero style anchor references."
      location: "milestone-m5.tasks.yaml, milestone-m6.tasks.yaml"
      recommendation: "RESOLVED: Added frontend_anchor_note fields to both m5 and m6 with React 19, Tailwind, shadcn/ui, and assistant-ui pattern guidance. Added specific frontend pattern references to m5-005 (layout) and m6-005 (assistant-ui)."
      status: resolved

    - id: WARN-003
      category: tdd
      description: "TDD was test-after (separate tasks) not test-first despite tdd_required: true."
      location: "milestone-m3/m4/m5/m7 tasks"
      recommendation: "RESOLVED: Added explicit 'TDD Approach' sections to m3-001, m3-003, m3-004, m3-007, m5-002, m7-001 and TDD step to m4-001. Code tasks now specify which failing tests to write first."
      status: resolved

    - id: WARN-004
      category: schema
      description: "Milestone m4 used different YAML structure for style_anchor_refs and global_constraints."
      location: "milestone-m4.tasks.yaml"
      recommendation: "RESOLVED: Restructured m4 style_anchor_refs to simple list format and global_constraints to object with allowed_patterns/forbidden_patterns/tdd_required, matching m0-m3 conventions."
      status: resolved

    - id: WARN-005
      category: best_practices
      description: "Code review tasks created code-reviews/ directory without setup."
      location: "Multiple milestone task files"
      recommendation: "RESOLVED: Added code-reviews/.gitkeep to m0-001 files.create list so directory is created during scaffolding."
      status: resolved

    - id: WARN-006
      category: best_practices
      description: "Node.js version conflict: m0-001 specified 23+ but m8-007 README said 20+."
      location: "milestone-m8.tasks.yaml: m8-007 vs milestone-m0.tasks.yaml: m0-001"
      recommendation: "RESOLVED: Updated m8-007 README instructions to specify Node.js 23+ (matching m0-001 engine requirement)."
      status: resolved

  info:
    - id: INFO-001
      category: best_practices
      description: "M4 task types use 'feature' and 'review' instead of 'code', 'test', 'config', 'code-review' used in other milestones."
      suggestion: "Normalize task type values across all milestones for consistency (code/test/config/code-review/docs)."

    - id: INFO-002
      category: best_practices
      description: "m5 API client (m5-003) describes all endpoints as POST (RPC style) but m3 endpoints include GET methods (listProjects, getProject). The API client should handle both GET and POST patterns."
      suggestion: "Update m5-003 instructions to clarify that GET endpoints use query params while POST endpoints use request bodies, and the typed client should handle both."

    - id: INFO-003
      category: quality_gates
      description: "Excellent parallel opportunity: m4 (People/Resource Services) and m5 (Inbox UI) can run concurrently after m3, saving 2-3 days."
      suggestion: "Consider splitting into parallel workstreams. m4 is backend-only (no frontend dependencies) and m5 only needs m3's API endpoints, not m4's."

    - id: INFO-004
      category: best_practices
      description: "The plan includes 9 code review tasks (one per milestone) totaling ~7.5 hours. This is thorough and ensures quality at each stage."
      suggestion: "Consider making code reviews lightweight (30m) for earlier milestones with simple scaffolding and longer (60-90m) for complex milestones like m3, m7."

