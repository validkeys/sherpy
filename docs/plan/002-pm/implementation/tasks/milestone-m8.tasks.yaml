  - id: m8-006
    name: "Fix any issues found during integration testing"
    description: |
      Address all bugs, failures, and issues discovered during the E2E, CLI
      lifecycle, API cross-service, WebSocket, and performance tests. This is
      the fix pass that follows the testing tasks.
    estimate_minutes: 120
    type: code
    dependencies: [m8-001, m8-002, m8-003, m8-004, m8-005]
    files:
      modify: []
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Fix all issues discovered during integration testing to achieve a fully
      passing test suite.

      **Implementation Steps:**
      1. Run the full test suite and collect all failures:
         ```
         pnpm test 2>&1 | tee test-results.log
         ```
      2. Categorize issues by type:
         - **Auth issues**: JWT validation edge cases, token expiry handling
         - **API issues**: Response schema mismatches, missing error handling
         - **WebSocket issues**: Connection cleanup, event serialization
         - **CLI issues**: Process lifecycle, PID file race conditions
         - **Performance issues**: Slow queries needing indexes or optimization
         - **Data integrity issues**: Foreign key violations, cascade behavior
      3. Fix each issue:
         - Write a failing test that reproduces the issue (if not covered)
         - Implement the fix
         - Verify the original test now passes
         - Run full suite to check for regressions
      4. For performance issues:
         - Add missing database indexes
         - Optimize N+1 query patterns with JOINs
         - Add query result caching where appropriate
      5. Re-run full test suite and verify zero failures

      **Constraints:**
      - Every fix must have a corresponding test that would have caught it
      - No fix should break existing passing tests
      - Performance fixes must not change query result shapes
      - Follow existing code patterns and style anchors

      **Success Criteria:**
      - Full test suite passes with zero failures
      - All integration tests pass reliably (no flaky tests)
      - Performance tests show all queries under 100ms
      - No regressions in previously passing tests

  - id: m8-007
    name: "Create README with setup and usage instructions"
    description: |
      Write the project README with comprehensive setup instructions, configuration
      guide, usage examples for CLI and web UI, and development contribution guide.
    estimate_minutes: 60
    type: docs
    dependencies: [m8-006]
    files:
      create:
        - README.md
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Create a comprehensive README that enables a new developer to set up and
      use Sherpy PM.

      **Implementation Steps:**
      1. Create `README.md` with the following sections:

         **Title & Description:**
         - Sherpy PM — Local-first project management with AI-assisted scheduling
         - Brief tagline: what it does, who it's for

         **Prerequisites:**
          - Node.js 23+ (required for Effect-TS latest patterns)
         - pnpm 9+ (specify exact version)
         - Okta developer account (for OIDC)
         - AWS account with Bedrock access (for AI scheduling)

         **Quick Start:**
         ```bash
         git clone <repo-url> sherpy && cd sherpy
         pnpm install
         pnpm run build
         sherpy start
         ```
         - What happens: daemon starts, browser opens to http://localhost:3100

         **Configuration:**
         - Environment variables table:
           | Variable | Required | Default | Description |
           |----------|----------|---------|-------------|
           | PORT | No | 3100 | API server port |
           | OKTA_DOMAIN | Yes | — | Okta tenant domain |
           | OKTA_CLIENT_ID | Yes | — | Okta SPA client ID |
           | AWS_REGION | Yes | — | AWS region for Bedrock |
           | AI_MODEL | No | anthropic.claude-3-5-sonnet | Bedrock model ID |
         - Config file location: ~/.sherpy/config.json (or .env)

         **CLI Commands:**
         - `sherpy start` — Start the daemon and open browser
         - `sherpy stop` — Stop the daemon gracefully
         - `sherpy status` — Check if daemon is running
         - Include example output for each command

         **Web UI Guide:**
         - Inbox: view all projects, filter by status/tag
         - Project detail: milestones, tasks, documents, chat
         - AI chat: interact with Sherpy flow for planning

         **Development:**
         ```bash
         pnpm install
         pnpm run dev        # Start API + web dev servers
         pnpm test           # Run all tests
         pnpm run lint       # Lint all packages
         pnpm run typecheck  # Type check all packages
         pnpm run build      # Build all packages
         ```
         - Monorepo structure diagram:
           ```
           packages/
           ├── cli/      CLI daemon management
           ├── api/      Effect-TS HTTP server + domain services
           ├── web/      React + Vite + Tailwind SPA
           └── shared/   Schema types, API contracts, events
           ```

         **Architecture Overview:**
         - Local-first: all data in SQLite at ~/.sherpy/sherpy.db
         - Effect-TS layered services on the backend
         - Okta OIDC SPA (PKCE) for authentication
         - WebSocket for real-time dashboard updates
         - AWS Bedrock for AI scheduling via Vercel AI SDK

         **Troubleshooting:**
         - "Port already in use" → change PORT or stop existing process
         - "Okta login fails" → verify OKTA_DOMAIN and OKTA_CLIENT_ID
         - "Daemon won't start" → check ~/.sherpy/sherpy.pid for stale PID
         - "AI scheduling unavailable" → verify AWS credentials and Bedrock access

      **Constraints:**
      - Write for a developer audience — assume familiarity with Node.js/TypeScript
      - Include actual commands that can be copy-pasted
      - Keep sections concise — link to separate docs for deep dives
      - No placeholder content — every section must have real, accurate info

      **Success Criteria:**
      - README covers setup, configuration, usage, and development
      - Quick Start section works end-to-end for a fresh clone
      - All environment variables documented
      - CLI commands include example output
      - Monorepo structure clearly explained

