    style_anchor_refs: []
    instructions: |
      **Objective:**
      Verify all database queries meet the <100ms performance requirement with
      a realistic dataset.

      **Implementation Steps:**
      1. Create `packages/api/tests/performance/query-perf.test.ts`:
      2. Create seed data function that generates:
         - 20 projects across various pipeline stages
         - 5-8 milestones per project (100-160 total)
         - 5-15 tasks per milestone (500-2400 total)
         - 30 people with skills
         - Assignments linking people to tasks
         - 3 schedule snapshots per project
      3. Seed database in `beforeAll`
      4. Profile each query type:

         **Project queries:**
         - List all projects with status filter — measure time
         - Get project by ID with milestones and task counts — measure time
         - Search projects by tag — measure time

         **Task queries:**
         - List tasks for milestone with assignees — measure time
         - Get task with full detail (assignees, tags, documents) — measure time
         - Filter tasks by status across project — measure time

         **People & assignment queries:**
         - List people with skills — measure time
         - Get person allocation summary (all assignments + effort) — measure time
         - Detect conflicts for a person — measure time

         **Schedule queries:**
         - Get latest schedule snapshot with assignments — measure time
         - List schedule history for project — measure time

         **Document queries:**
         - List documents for project — measure time
         - Get document by type — measure time

      5. Each test runs the query 10 times and reports:
