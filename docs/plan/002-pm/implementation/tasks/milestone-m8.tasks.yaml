         - [ ] CLI lifecycle tests cover start/stop/restart
         - [ ] API integration tests cover all endpoints
         - [ ] WebSocket tests cover event delivery
         - [ ] Performance tests verify <100ms queries
         - [ ] All tests pass reliably (no flakiness)

      6. **Documentation:**
         - [ ] README is complete and accurate
         - [ ] All environment variables documented
         - [ ] CLI commands documented with examples
         - [ ] Architecture overview is current

      **Output:** Create `code-reviews/2026-04-20-final-code-review.yaml` with:
      - findings: list of issues categorized by severity (critical/major/minor)
      - summary: overall assessment
      - approval: yes/no decision with conditions

