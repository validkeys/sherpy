tasks:
  - id: m8-001
    name: "E2E test — install → start → login → see inbox → create project"
    description: |
      Write a comprehensive end-to-end test that exercises the full user journey:
      installing dependencies, starting the daemon, authenticating via Okta,
      viewing the inbox, and creating a new project. This test validates that
      all system components integrate correctly from the user's perspective.
    estimate_minutes: 120
    type: test
    dependencies: []
    files:
      create:
        - tests/e2e/full-journey.test.ts
      touch_only:
        - packages/cli/src/commands/start.ts
        - packages/api/src/server.ts
        - packages/web/src/pages/inbox.tsx
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Validate the complete user journey from install to project creation in a
      single automated test.

      **Implementation Steps:**
      1. Create `tests/e2e/full-journey.test.ts`:
         - Set up a temporary test directory with a fresh ~/.sherpy config
         - Step 1 — Install: run `pnpm install` and verify build succeeds
         - Step 2 — Start: execute `sherpy start` and verify:
           - PID file created at ~/.sherpy/sherpy.pid
           - API server responds to GET /api/health within 5 seconds
           - Process is alive and listening
         - Step 3 — Login: simulate Okta OIDC SPA flow:
           - Mock Okta token endpoint to return a valid JWT
           - Send POST /api/auth/callback with authorization code
           - Verify API returns session and user profile
         - Step 4 — See inbox: call GET /api/projects with valid JWT:
           - Verify 200 response with empty project list
           - Verify response matches schema (ProjectListResponse)
         - Step 5 — Create project: call POST /api/projects with valid JWT:
           - Send CreateProjectRequest body
           - Verify 201 response with created project
           - Verify project appears in subsequent GET /api/projects
         - Step 6 — Assign person: call POST /api/people to create a person,
           then POST /api/assignments to assign them to a task in the project
           - Verify assignment returned correctly
           - Verify person appears in project resource list
         - Teardown: run `sherpy stop`, verify PID file removed, process dead
      2. Use `beforeAll` to start daemon, `afterAll` to stop
      3. Use real HTTP calls (fetch or supertest equivalent) — no mocked API
      4. Mock only the Okta JWKS/token endpoint externally

      **Constraints:**
      - ONLY use real system components — no API mocking except Okta
      - Test must be idempotent — cleanup all created data in afterAll
      - Use OS-assigned port (port 0) to avoid port conflicts in CI
      - Test timeout of 60 seconds for the full suite
      - No style anchors apply to E2E tests — focus on integration coverage

      **Success Criteria:**
      - Full journey test passes from install through project creation
      - Each step asserts on expected HTTP status and response shape
      - Daemon starts and stops cleanly within test lifecycle
      - No orphaned processes after test completes

  - id: m8-002
    name: "CLI lifecycle integration tests (start, use, stop, restart)"
    description: |
      Test the full CLI daemon lifecycle: start the daemon, verify it's running,
      make API requests, stop it, verify it's stopped, then restart and verify
      it works again. Covers edge cases like double-start, stop-when-stopped,
      and crash recovery.
    estimate_minutes: 90
    type: test
    dependencies: []
    files:
      create:
        - packages/cli/tests/lifecycle.test.ts
      touch_only:
        - packages/cli/src/commands/start.ts
        - packages/cli/src/commands/stop.ts
        - packages/cli/src/daemon.ts
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Verify the CLI daemon lifecycle is reliable across start, stop, and restart
      scenarios including edge cases.

      **Implementation Steps:**
      1. Create `packages/cli/tests/lifecycle.test.ts`:
      2. Test cases:
         - **start**: Run `sherpy start`:
           - Verify PID file created
           - Verify process is alive (process.kill(pid, 0) succeeds)
           - Verify API server responds to health check
         - **double-start**: Run `sherpy start` again:
           - Verify "already running" message
           - Verify same PID (no second process spawned)
         - **use while running**: Make API request to health endpoint:
           - Verify 200 response
         - **stop**: Run `sherpy stop`:
           - Verify SIGTERM sent
           - Verify process exits within 10 seconds
           - Verify PID file removed
         - **stop-when-stopped**: Run `sherpy stop` again:
           - Verify "not running" message
           - Verify no error thrown
         - **restart**: Run `sherpy start` again after stop:
           - Verify new PID file created
           - Verify new process is alive
           - Verify API server responds
         - **crash recovery**: Kill daemon process directly (SIGKILL):
           - Verify PID file still exists
           - Run `sherpy start` — should detect stale PID, clean up, start fresh
           - Verify new daemon running
      3. Each test case in separate `it` block with `afterEach` cleanup
      4. Use a test-specific data directory (temp dir) to avoid conflict with
         real user data

      **Constraints:**
      - Use real child process spawning — no mocks on CLI commands
      - Use OS-assigned port to avoid conflicts
      - Clean up all processes and temp files in afterEach/afterAll
      - Test timeout of 30 seconds per test case

      **Success Criteria:**
      - All lifecycle scenarios pass reliably
      - No orphaned processes after any test case
      - Stale PID detection and cleanup works
      - Double-start and double-stop handled gracefully

