  - id: m8-004
    name: "WebSocket real-time event delivery tests"
    description: |
      Verify that WebSocket connections authenticate correctly, receive broadcast
      events within 200ms of data changes, handle reconnection, and clean up
      on disconnect.
    estimate_minutes: 60
    type: test
    dependencies: []
    files:
      create:
        - packages/api/tests/integration/websocket-events.test.ts
      touch_only:
        - packages/api/src/api/websocket.ts
        - packages/api/src/services/event-broadcaster.ts
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Verify WebSocket real-time event delivery meets the 200ms latency
      requirement and handles connection lifecycle correctly.

      **Implementation Steps:**
      1. Create `packages/api/tests/integration/websocket-events.test.ts`:
      2. Start test API server with WebSocket endpoint
      3. Test cases:

         **Authentication:**
         - Connect to /ws with valid JWT → verify connection accepted
         - Connect to /ws without JWT → verify connection rejected
         - Connect to /ws with expired JWT → verify connection rejected

         **Event delivery:**
         - Connect two clients with valid JWTs
         - Create a project via REST API
         - Verify both WebSocket clients receive ProjectCreated event
         - Measure latency from API response to WebSocket message arrival
         - Assert latency < 200ms
         - Update project status via REST API
         - Verify both clients receive ProjectStatusUpdated event
         - Create task, verify TaskCreated event broadcast
         - Update task status, verify TaskStatusUpdated event broadcast

         **Connection lifecycle:**
         - Connect client, then disconnect
         - Verify server removes connection from pool
         - Broadcast event, verify disconnected client does not receive
         - Reconnect client, verify it receives new events

         **Concurrent connections:**
         - Connect 10 clients simultaneously
         - Broadcast event
         - Verify all 10 clients receive the event
         - Verify no duplicate events

      4. Use WebSocket client from @effect/platform or ws library
      5. Use performance.now() for latency measurements

      **Constraints:**
      - Use real WebSocket connections — no mocking
      - Latency assertions must be generous enough for CI (use 200ms threshold)
      - Clean up all WebSocket connections in afterEach
      - Test timeout of 15 seconds per test case

      **Success Criteria:**
      - JWT authentication on WebSocket connect works
      - Events broadcast to all connected clients
      - Event delivery latency under 200ms
      - Disconnected clients don't receive events
      - No duplicate events received by any client

