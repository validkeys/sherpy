global_constraints:
  allowed_patterns:
    - "Use Schema.Struct and Schema.Literal for domain type definitions (SA-006)"
    - "Use Schema.Class for API request/response types and tagged errors (SA-007)"
    - "Use Model.Class for database entity definitions with insert/update variants (SA-002)"
    - "Use Schema.TaggedError for all error types with _tag discriminant"
    - "Use Effect.gen for composing async operations in services"
    - "Use SqlMigrator for migration management (SA-010)"
  forbidden_patterns:
    - "Plain TypeScript interfaces for types needing runtime validation"
    - "Type assertions (as) on external data — use Schema.decodeUnknown"
    - "Throwing exceptions — use Effect.fail with TaggedErrors"
    - "Database-specific SQL — write queries compatible with both SQLite and PostgreSQL"
    - "Enum types — use Schema.Literal unions instead"
  tdd_required: true
  max_task_duration_minutes: 120
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-task
    criteria:
      - All dependency tasks marked complete
      - pnpm run build passes for shared and api packages
      - SQLite test database accessible
      - Style anchors SA-002, SA-006, SA-007 reviewed
  - stage: pre-commit
    commands:
      - pnpm run lint
      - pnpm run typecheck
      - pnpm test
  - stage: task-completion
    criteria:
      - All tests passing
      - No lint errors
      - No type errors
      - Schema types provide full type inference
  - stage: milestone-completion
    criteria:
      - All 12 database tables created by migrations
      - All Model.Class entities support CRUD variant schemas
      - All API schemas validate correctly
      - Migration runner detects and runs pending migrations
      - Schema test coverage exceeds 80%

tasks:
  - id: m1-001
    name: "Define project and milestone domain schemas"
    description: |
      Create Effect Schema definitions for Project and Milestone domain types
      using Model.Class with insert, update, and select variants. Include
      pipeline status enum, priority levels, and proper field constraints.
    estimate_minutes: 60
    type: code
    dependencies: []
    files:
      create:
        - packages/shared/src/schemas/project.ts
        - packages/shared/src/schemas/milestone.ts
    style_anchor_refs:
      - SA-002
      - SA-006
    instructions: |
      **Objective:**
      Define Project and Milestone domain models using Model.Class.

      **Style Anchors:**
      Follow these established patterns:
      - See `artifacts/style-anchors/SA-002.md` — Model.Class with makeRepository
      - See `artifacts/style-anchors/SA-006.md` — Effect Schema domain types

      Reference files:
      - `~/Sites/ai-use-repos/effect/packages/sql/src/Model.ts:82-157` — Model.Class definition pattern
      - `~/Sites/ai-use-repos/EffectPatterns/packages/pipeline-state/src/schemas.ts:1-234` — domain schema patterns

      **Implementation Steps:**
      1. Create `packages/shared/src/schemas/project.ts`:
         - PipelineStatus: Schema.Literal union of all pipeline stages (intake through archived)
         - Priority: Schema.Literal("low", "medium", "high", "critical")
         - Project model using Model.Class with fields:
           id, slug, name, description, pipelineStatus, assignedPeople (JSON array),
           tags (JSON array), priority, createdAt (DateTimeInsert), updatedAt (DateTimeUpdate)
         - Use Model.Generated for id field
         - Use Model.JsonFromString for assignedPeople and tags arrays
      2. Create `packages/shared/src/schemas/milestone.ts`:
         - MilestoneStatus: Schema.Literal("pending", "in-progress", "blocked", "complete")
         - Milestone model using Model.Class with fields:
           id, projectId, name, description, status, orderIndex,
           estimatedDays, acceptanceCriteria, createdAt, updatedAt
      3. Export all types and schemas from each file
      4. Update schemas/index.ts barrel export

      **Constraints:**
      - ONLY use: Model.Class, Schema.Literal, Schema.Struct
      - Follow **SA-002** for Model.Class structure with variant schemas
      - Follow **SA-006** for Schema.Literal enum patterns
      - NEVER use: TypeScript enum keyword or plain interfaces
      - Include proper JSDoc for all exported types

      **Success Criteria:**
      - Project and Milestone models compile with full type inference
      - insert.make(), update.make() constructors available
      - Schema.decodeUnknown validates valid and rejects invalid data

