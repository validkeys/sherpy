  - id: m1-007
    name: "Create SQL migration 001 — core tables"
    description: |
      Write the first SQL migration creating projects, milestones, tasks,
      and tags tables with proper foreign keys, cascading deletes, and
      indexes. Must be compatible with both SQLite and PostgreSQL.
    estimate_minutes: 60
    type: code
    dependencies: [m1-001, m1-002, m1-004]
    files:
      create:
        - packages/api/src/db/migrations/001_core_tables.sql
    style_anchor_refs:
      - SA-010
    instructions: |
      **Objective:**
      Create the first SQL migration for core tables.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-010.md` — Migration runner patterns

      Reference files:
      - `~/Sites/ai-use-repos/effect/packages/sql/src/Migrator.ts:73-351` — migration structure

      **Implementation Steps:**
      1. Create `001_core_tables.sql` with:
         - projects table (all fields from technical requirements data model)
         - milestones table with FK to projects, ON DELETE CASCADE
         - tasks table with FK to milestones and projects, ON DELETE CASCADE
         - tags table with unique name constraint
      2. Add indexes:
         - idx_projects_pipeline_status ON projects(pipeline_status, updated_at DESC)
         - idx_milestones_project ON milestones(project_id, order_index)
         - idx_tasks_milestone ON tasks(milestone_id, order_index)
         - idx_tasks_project ON tasks(project_id, status)
      3. Use CREATE TABLE IF NOT EXISTS for idempotency
      4. Use TEXT for all date columns (ISO 8601)
      5. Use JSON-compatible TEXT for JSON columns (tags, assignedPeople)

      **Constraints:**
      - ONLY use: SQL compatible with both SQLite and PostgreSQL
      - NEVER use: database-specific features (RETURNING, SERIAL, etc.)
      - Use TEXT PRIMARY KEY (IDs are generated in application code)
      - All foreign keys use ON DELETE CASCADE
      - Follow **SA-010** for migration file naming convention

      **Success Criteria:**
      - Migration SQL parses without syntax errors
      - Tables created with correct columns, types, and constraints
      - Indexes created for query optimization
      - Foreign keys enforce referential integrity

