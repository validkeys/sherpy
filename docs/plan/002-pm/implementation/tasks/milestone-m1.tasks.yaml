  - id: m1-010
    name: "Create migration runner service"
    description: |
      Implement the database migration runner service using @effect/sql
      SqlMigrator. The service auto-runs pending migrations on daemon startup
      and tracks applied migrations in a management table.
    estimate_minutes: 60
    type: code
    dependencies: [m1-007, m1-008, m1-009]
    files:
      create:
        - packages/api/src/db/migration-runner.ts
      modify:
        - packages/api/src/db/index.ts
    style_anchor_refs:
      - SA-001
      - SA-010
    instructions: |
      **Objective:**
      Create the migration runner service using Effect-TS patterns.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-001.md` — Effect.Service with Layer DI
      - See `artifacts/style-anchors/SA-010.md` — SqlMigrator patterns

      Reference files:
      - `~/Sites/ai-use-repos/effect/packages/sql/src/Migrator.ts:73-351` — SqlMigrator implementation

      **Implementation Steps:**
      1. Create `packages/api/src/db/migration-runner.ts`:
         - Define MigrationRunnerService using Effect.Service pattern (**SA-001**)
         - Use SqlMigrator.make() with fromGlob loader (**SA-010**)
         - Load migrations from `./migrations/*.sql` glob pattern
         - Configure migration tracking table name (e.g., "_migrations")
         - Wrap migration execution in sql.withTransaction
      2. Create a SqliteLive layer that provides:
         - SqlClient connected to ~/.sherpy/sherpy.db
         - Auto-creates ~/.sherpy/ directory if missing
         - Runs migrations on Layer initialization
      3. Export MigrationRunnerLive layer with full dependency chain
      4. Update db/index.ts to export the migration runner

      **Constraints:**
      - ONLY use: SqlMigrator from @effect/sql for migration management
      - Follow **SA-001** for service Layer pattern
      - Follow **SA-010** for SqlMigrator configuration
      - NEVER use: custom migration tracking — use SqlMigrator built-in

      **Success Criteria:**
      - Migration runner service created with Effect.Service pattern
      - SqliteLive layer connects to local database file
      - Migrations run automatically when layer is provided
      - Re-running does not apply already-applied migrations

