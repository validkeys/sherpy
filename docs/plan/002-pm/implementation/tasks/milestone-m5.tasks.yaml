    description: |
      Create the three-panel inbox layout: a fixed sidebar for navigation and
      filters, a scrollable project list in the center, and a detail preview
      panel on the right. The layout uses Tailwind CSS flexbox/grid with
      responsive behavior. On smaller viewports, the detail panel becomes a
      Sheet overlay. The sidebar includes navigation links and a collapse toggle.
    estimate_minutes: 90
    type: code
    dependencies: [m5-001, m5-002, m5-003, m5-004]
    files:
      create:
        - packages/web/src/components/inbox/inbox-layout.tsx
        - packages/web/src/components/inbox/sidebar.tsx
        - packages/web/src/components/inbox/detail-panel.tsx
      modify:
        - packages/web/src/App.tsx
    style_anchor_refs:
      - SA-011
      - SA-013
    instructions: |
      **Objective:**
      Build the three-panel inbox layout shell that serves as the main UI.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-011.md` — shadcn Mail/Inbox layout with ResizablePanel
      - See `artifacts/style-anchors/SA-013.md` — React 19 composition patterns

      **Frontend Pattern Reference:** Use ResizablePanelGroup (SA-011) for adjustable
      three-panel layout. Keep components pure with compound component pattern (SA-013).
      Delegate data fetching to child components (composition over props).

      **Implementation Steps:**
      1. Create `packages/web/src/components/inbox/inbox-layout.tsx`:
         - Three-column layout: sidebar (240px) | project list (flex-1, min 400px) | detail panel (400px)
         - Use Tailwind flex with h-screen overflow-hidden
         - Sidebar collapsible to icon-only mode (48px)
         - Detail panel shows placeholder when no project selected
         - On viewport < 1280px: detail panel renders as shadcn Sheet (slide-in from right)
         - Accept props: selectedProjectId, onProjectSelect, onToggleSidebar, sidebarCollapsed
         - Manage layout state via component state
      2. Create `packages/web/src/components/inbox/sidebar.tsx`:
         - Fixed sidebar with:
           - Sherpy logo/wordmark at top
           - "New Project" button (shadcn Button)
           - Pipeline status filter links (inbox counts for each status)
           - Tag filter section (collapsible, shows all tags)
           - "My Projects" filter (projects assigned to current user)
           - Collapse toggle button at bottom
         - Use shadcn ScrollArea for overflow content
         - Use shadcn Badge for status counts
         - Sidebar state: collapsed (icon-only) or expanded (full labels)
         - Emit filter changes to parent via callbacks
      3. Create `packages/web/src/components/inbox/detail-panel.tsx`:
         - Right panel showing selected project preview:
           - Project name and description
           - Pipeline status badge (large, prominent)
           - Milestones progress bar
           - Tags as badge list
           - Assigned people avatars/names
           - "Open Project" button (navigates to full detail view, deferred to m6)
         - Placeholder state when no project selected
         - Uses shadcn Badge, Button, ScrollArea
         - On narrow viewport: renders inside shadcn Sheet
      4. Wire up in App.tsx:
         - Wrap inbox layout in AuthProvider and ProtectedRoute
         - Initialize API client and WebSocket client
         - Pass selected project state down

      **Constraints:**
      - ONLY use Tailwind CSS utility classes for styling
      - ONLY use shadcn/ui components for interactive elements
      - No CSS files, no CSS modules, no styled-components
      - Layout must work at 1280px+ viewport (primary target)
      - Detail panel must gracefully degrade on narrower viewports
      - All text visible, no overflow clipping on content

      **Success Criteria:**
      - Three-panel layout renders correctly at 1280px+ viewport
      - Sidebar collapses to icon-only mode
      - Detail panel shows placeholder when no project selected
      - Detail panel becomes Sheet overlay on narrow viewports
      - No horizontal page scrolling
