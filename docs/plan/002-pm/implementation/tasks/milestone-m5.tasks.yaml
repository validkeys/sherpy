  - id: m5-008
    name: "Wire up real-time updates via WebSocket"
    description: |
      Connect the inbox UI to the WebSocket client for real-time project updates.
      When a project status changes, a task is updated, or an assignment is
      modified on the server, the inbox list and detail panel update immediately
      without requiring a page refresh. Project list re-sorts by updated_at when
      changes arrive. Status badges animate on change.
    estimate_minutes: 45
    type: code
    dependencies: [m5-004, m5-005, m5-006]
    files:
      create:
        - packages/web/src/hooks/use-realtime-projects.ts
      modify:
        - packages/web/src/components/inbox/project-list.tsx
        - packages/web/src/components/inbox/detail-panel.tsx
        - packages/web/src/components/inbox/pipeline-status-badge.tsx
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Wire up real-time WebSocket updates to the inbox UI components.

      **Implementation Steps:**
      1. Create `packages/web/src/hooks/use-realtime-projects.ts`:
         - Custom hook that manages project list with real-time updates
         - Initial load: fetch all projects via API client listProjects()
         - Subscribe to WebSocket events:
           - project:updated → update project in list, re-sort by updated_at
           - project:pipelineStatusChanged → update pipeline status, animate badge
           - task:statusChanged → update task status in detail panel
           - assignment:created / assignment:updated → update assignments
         - Optimistic updates: update local state immediately, confirm on next WS event
         - Return: projects[], loading, error, refresh()
         - Re-sort projects by updated_at DESC after each update
      2. Update project-list.tsx:
         - Replace static project list with useRealtimeProjects hook
         - Animate row on update (brief highlight flash via Tailwind transition)
         - Show connection status indicator (green dot = connected, gray = disconnected)
      3. Update detail-panel.tsx:
