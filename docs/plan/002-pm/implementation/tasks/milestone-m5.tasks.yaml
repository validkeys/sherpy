  - id: m5-002
    name: "Create Okta OIDC SPA login flow with PKCE"
    description: |
      Implement the Okta OIDC SPA authentication flow using PKCE (no client
      secret). Handle login redirect, token exchange, token storage, and
      automatic token refresh. Create an AuthProvider context that wraps the
      app and provides auth state to all components. Unauthenticated users
      are redirected to Okta login. Token is attached to all API and
      WebSocket requests.
    estimate_minutes: 90
    type: code
    dependencies: []
    files:
      create:
        - packages/web/src/lib/auth.ts
        - packages/web/src/components/auth/auth-provider.tsx
        - packages/web/src/components/auth/login-page.tsx
        - packages/web/src/components/auth/protected-route.tsx
      modify:
        - packages/web/src/App.tsx
        - packages/web/src/main.tsx
        - packages/web/vite.config.ts
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Implement Okta OIDC SPA login flow with PKCE for browser authentication.

      **TDD Approach:** Write failing test for token validation flow (mock Okta
      JWKS endpoint) before implementing auth provider. Test 401 redirect
      behavior before implementing ProtectedRoute.

      **Implementation Steps:**
      1. Install `@okta/okta-auth-js` in packages/web
      2. Create `packages/web/src/lib/auth.ts`:
         - Initialize OktaAuth with PKCE configuration:
           - issuer: from VITE_OKTA_DOMAIN env var
           - clientId: from VITE_OKTA_CLIENT_ID env var
           - redirectUri: window.location.origin + /login/callback
           - postLogoutRedirectUri: window.location.origin
           - scopes: ['openid', 'profile', 'email']
           - pkce: true
         - Export singleton auth client instance
         - Helper functions: getAccessToken(), isAuthenticated(), getUserInfo()
      3. Create `packages/web/src/components/auth/auth-provider.tsx`:
         - React context providing: authState, login(), logout(), accessToken
         - Subscribe to OktaAuth authState changes
         - Handle token refresh automatically via Okta SDK
         - Render children only when authenticated, else show login redirect
      4. Create `packages/web/src/components/auth/login-page.tsx`:
         - Simple centered login page with shadcn Button
         - "Sign in with Okta" button triggers authClient.signInWithRedirect()
         - Show loading state during redirect
      5. Create `packages/web/src/components/auth/protected-route.tsx`:
         - Wrapper that checks auth state
         - Redirects to login page if not authenticated
         - Shows spinner while auth state resolves
      6. Add /login/callback route in App.tsx that handles Okta redirect
         - Parse tokens from URL
         - Redirect to inbox on success
      7. Configure Vite env vars:
         - VITE_OKTA_DOMAIN
         - VITE_OKTA_CLIENT_ID
         - VITE_API_URL (default: http://localhost:3100)

      **Constraints:**
      - ONLY use @okta/okta-auth-js for OIDC (no manual PKCE implementation)
      - NEVER store client_secret in browser code (PKCE flow only)
      - Store tokens in session storage (cleared on tab close)
      - Do NOT use localStorage for tokens (session storage only)
      - All API requests must include Authorization: Bearer {token}

      **Success Criteria:**
      - Unauthenticated users redirect to Okta login page
      - Successful login redirects back to inbox with valid access token
      - AuthProvider supplies token to all child components
      - Token refresh happens automatically before expiry
      - Logout clears session and redirects to login page

  - id: m5-003
    name: "Create typed API client for all RPC endpoints"
    description: |
      Build a typed fetch wrapper that calls all backend RPC endpoints with
      full TypeScript type safety. Import request/response types from the
      shared package. Handle auth token injection, error parsing, and response
      validation. The client is a singleton used by all data-fetching hooks.
    estimate_minutes: 60
    type: code
    dependencies: [m5-002]
    files:
      create:
        - packages/web/src/lib/api-client.ts
        - packages/web/src/hooks/use-api.ts
      modify: []
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Create a fully typed API client for all backend RPC endpoints.

      **Implementation Steps:**
      1. Create `packages/web/src/lib/api-client.ts`:
         - Import request/response types from `@sherpy/shared`
         - Define endpoint map (method + path + request type + response type):
           - createProject, listProjects, getProject, updateProject
           - updateTaskStatus
           - listPeople, createPerson, updatePerson
           - assignPerson, unassignPerson
           - getResourceAllocation, detectConflicts
           - getDocuments, getDocument, exportDocument
           - generateSchedule, createScenario, whatIfReschedule, listScheduleSnapshots
           - chat, getChatHistory
         - Create ApiClient class:
           - constructor(baseUrl: string, getToken: () => Promise<string>)
           - private async rpc<TReq, TRes>(endpoint: string, body: TReq): Promise<TRes>
             - Sets Content-Type: application/json
             - Sets Authorization: Bearer {token} from getToken()
             - POST to {baseUrl}{endpoint}
             - Parse response JSON
             - Throw typed ApiError on non-200 (with status, message, code)
           - Public methods for each endpoint (typed)
         - Export singleton factory: createApiClient(baseUrl, getToken)
      2. Create `packages/web/src/hooks/use-api.ts`:
         - Custom hook that provides typed API client
         - Gets base URL from VITE_API_URL env var
         - Gets token from auth context
         - Returns memoized ApiClient instance
         - Handles 401 by triggering re-authentication

      **Constraints:**
      - ONLY use native fetch (no axios or other HTTP libraries)
      - All endpoints are POST (RPC style) except GET /api/health
      - Import types from @sherpy/shared (workspace dependency)
      - Client must be usable without React (pure TypeScript class)
      - Error responses must be typed (not just Error)

      **Success Criteria:**
      - API client methods have full type inference (request params, response type)
      - Auth token injected on every request automatically
      - 401 responses trigger re-authentication flow
      - Network errors wrapped in typed ApiError

  - id: m5-004
    name: "Create WebSocket client with reconnection and event dispatch"
    description: |
      Build a WebSocket client that connects to the /ws endpoint with JWT
      authentication. Implement exponential backoff reconnection, typed event
      parsing from shared schemas, and a custom event dispatcher that React
      components can subscribe to. The client dispatches typed events that
      inbox components consume for real-time updates.
    estimate_minutes: 60
    type: code
    dependencies: [m5-002]
    files:
      create:
        - packages/web/src/lib/ws-client.ts
        - packages/web/src/hooks/use-websocket.ts
      modify: []
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Create a WebSocket client with reconnection and typed event dispatch.

      **Implementation Steps:**
      1. Create `packages/web/src/lib/ws-client.ts`:
         - Import WsEvent types from `@sherpy/shared`
         - Define event types matching server broadcasts:
           - project:updated, project:pipelineStatusChanged
           - task:statusChanged, assignment:created, assignment:updated
           - conflict:detected, document:generated, chat:message
           - schedule:generated
         - Create WebSocketClient class:
           - constructor(url: string, getToken: () => Promise<string>)
           - connect(): opens WebSocket, sends JWT as first message
           - Event listener map: Map<string, Set<Handler>>
           - on(eventType: string, handler: Function): unsubscribe function
           - off(eventType: string, handler: Function): void
           - Reconnection with exponential backoff (1s, 2s, 4s, 8s, max 30s)
           - Jitter on backoff to prevent thundering herd
           - Max reconnection attempts: unlimited (local-first tool)
           - Parse incoming messages as typed WsEvent
           - Dispatch to registered handlers
           - Connection state tracking: connecting, connected, disconnected, reconnecting
           - destroy(): clean close, remove all listeners
      2. Create `packages/web/src/hooks/use-websocket.ts`:
         - Custom hook that manages WebSocket lifecycle
         - Connects on mount, disconnects on unmount
         - Provides: connectionState, subscribe(eventType, handler)
         - subscribe returns unsubscribe function
         - Auto-reconnects using client's built-in reconnection

      **Constraints:**
      - ONLY use native WebSocket (no socket.io or similar)
      - JWT sent as first message after connection opens
      - Reconnection must not hammer the server (exponential backoff)
      - Client must be usable without React (pure TypeScript class)
      - Event types must match server's WsEvent schema exactly

      **Success Criteria:**
      - WebSocket connects and authenticates with JWT
      - Typed events dispatched to registered handlers
      - Reconnection works with exponential backoff after disconnect
      - Connection state observable by consuming components
      - Cleanup on unmount prevents memory leaks

  - id: m5-005
