  - id: m6-005
    name: "Integrate assistant-ui for per-project chat"
    description: |
      Integrate the assistant-ui library to provide a per-project AI chat
      interface. The chat panel lives within the project detail view,
      allowing users to discuss project context with the AI assistant.
      Uses assistant-ui's Thread component with runtime configured to
      connect to the project-specific chat API endpoint.
    estimate_minutes: 90
    type: code
    dependencies: [m6-001]
    files:
      create:
        - packages/web/src/components/chat/project-chat-panel.tsx
        - packages/web/src/components/chat/chat-assistant-ui-provider.tsx
      modify:
        - packages/web/src/pages/project-detail.tsx
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Integrate assistant-ui for per-project AI chat.

      **Frontend Pattern Reference:** Follow assistant-ui docs for
      AssistantRuntimeProvider setup. Use useExternalStoreRuntime for
      backend-connected chat (not useLocalRuntime). Scope to project via
      runtime config. All chat UI must come from assistant-ui — no custom
      message bubbles or input fields.

      **Implementation Steps:**
      1. Install assistant-ui package if not already present (pnpm add assistant-ui)
      2. Create `packages/web/src/components/chat/chat-assistant-ui-provider.tsx`:
         - Wrap assistant-ui's AssistantRuntimeProvider
         - Configure runtime to use project-scoped chat API endpoint
         - Pass project ID as context to the runtime
         - Use useExternalStoreRuntime or useLocalRuntime depending on backend
         - Configure with API endpoint: POST /api/projects/:id/chat
      3. Create `packages/web/src/components/chat/project-chat-panel.tsx`:
         - Use assistant-ui's Thread component for message display
         - Use assistant-ui's Composer component for message input
         - Add toggle button to show/hide chat panel (slide-in from right)
         - Panel width: ~400px on desktop, full-screen overlay on mobile
         - Show chat bubble icon button when panel is collapsed
         - Include message count badge on toggle button
      4. Update project-detail.tsx:
         - Wrap page content in ChatAssistantUIProvider
         - Add ProjectChatPanel as a sibling to main content
         - Layout: main content area + optional chat panel side-by-side

      **Constraints:**
      - ONLY use: assistant-ui components for ALL chat UI — NO custom chat UI
      - Chat context must be scoped to the current project ID
      - Do NOT build custom message bubbles, input fields, or thread displays
      - Use assistant-ui's theming/styling capabilities for visual integration
      - Chat panel must not overlap or obscure project content on mobile

      **Success Criteria:**
      - Chat panel toggles open/closed from project detail view
      - Messages send to project-specific API endpoint
      - AI responses render in assistant-ui Thread component
      - Chat panel responsive — side panel on desktop, overlay on mobile
      - No custom chat components — all from assistant-ui library

  - id: m6-006
    name: "Implement chat message persistence via API"
    description: |
      Create the backend API endpoints for persisting and retrieving chat
      messages per project. Messages are stored in the local SQLite database
      and loaded when a user opens the project chat. Supports message history
      retrieval with pagination.
    estimate_minutes: 60
    type: code
    dependencies: [m6-005]
    files:
      create:
        - packages/api/src/services/chat-service.ts
      modify:
        - packages/api/src/api/routes/chat.ts
        - packages/api/src/server.ts
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Implement chat message persistence via API. This task extends the chat
      infrastructure from m3 (ChatSessionService, chat routes) with AI-aware
      message handling and cursor-based pagination.

      **Implementation Steps:**
      1. Create `packages/api/src/services/chat-service.ts`:
         - Effect.Service for chat message operations (distinct from ChatSessionService
           from m3-008 which manages session lifecycle; this service handles individual
           message persistence and retrieval)
         - sendMessage(projectId, role, content): saves message to DB
         - getMessages(projectId, limit?, before?): retrieves message history
            with cursor-based pagination
         - Database table: chat_messages (id, project_id, role, content,
            created_at)
         - Use Schema for message validation
      2. Modify `packages/api/src/api/routes/chat.ts` (extends routes from m3-011):
         - POST /api/projects/:id/chat — send message and get AI response
           - Saves user message to DB
           - Forwards to AI backend (or returns placeholder for now)
           - Saves assistant response to DB
           - Returns both messages
         - GET /api/projects/:id/chat/messages — retrieve message history
           - Query params: limit (default 50), before (cursor)
           - Returns messages in chronological order
      3. Update server.ts:
         - Register chat API group with auth middleware

      **Constraints:**
      - ONLY use: Effect.Service pattern for ChatService
      - ONLY use: schema-validated request/response for endpoints
      - Messages scoped to project ID — never cross-project
      - Cursor-based pagination (not offset-based) for message history
      - AI response can be a placeholder echo for now if AI backend not ready

      **Success Criteria:**
      - POST /api/projects/:id/chat saves and returns messages
      - GET /api/projects/:id/chat/messages returns paginated history
      - Messages persist across server restarts (SQLite)
      - Endpoint requires authentication
      - Response times under 200ms for message retrieval

