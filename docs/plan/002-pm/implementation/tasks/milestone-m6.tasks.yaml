  - id: m6-008
    name: "Wire project pipeline status transitions to real-time updates"
    description: |
      Connect the pipeline status visualization to real-time WebSocket
      events. When a task status changes or a pipeline stage completes,
      the UI updates without requiring a page refresh. Uses the WebSocket
      connection established in m2.
    estimate_minutes: 45
    type: code
    dependencies: [m6-001, m6-007]
    files:
      create:
        - packages/web/src/hooks/use-project-events.ts
      modify:
        - packages/web/src/components/project/pipeline-status.tsx
        - packages/web/src/pages/project-detail.tsx
    style_anchor_refs: []
    instructions: |
      **Objective:**
      Wire pipeline status to real-time WebSocket updates.

      **Implementation Steps:**
      1. Create `packages/web/src/hooks/use-project-events.ts`:
         - Hook that subscribes to WebSocket events for a specific project ID
         - Filters events by project ID
         - Handles: task-status-changed, milestone-completed,
           pipeline-stage-changed events
         - Returns latest event for components to react to
         - Re-subscribes on WebSocket reconnection
      2. Update pipeline-status.tsx:
         - Consume useProjectEvents hook
         - Animate stage transitions when pipeline stage changes
         - Update progress indicators on task status changes
      3. Update project-detail.tsx:
         - Invalidate/refresh project data query on relevant events
         - Use React Query invalidation for data freshness
         - Debounce rapid updates (e.g., batch task status changes)

      **Constraints:**
      - ONLY use: existing WebSocket connection from m2
      - Filter events by project ID — only react to current project events
      - Handle WebSocket disconnection gracefully (polling fallback optional)
      - Animate transitions, do not jarringly re-render

      **Success Criteria:**
      - Pipeline status updates in real-time when tasks change status
      - Stage transitions animate smoothly
      - No full page refresh required for status updates
      - WebSocket disconnection does not break the UI

