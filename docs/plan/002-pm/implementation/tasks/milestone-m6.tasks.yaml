    name: "Build project detail view with pipeline status visualization"
    description: |
      Create the main project detail page that displays at /projects/:id.
      Shows project metadata, pipeline status as a visual stepper/progress
      bar, and overall project health. Fetches project data from the API
      and handles loading and error states.
    estimate_minutes: 90
    type: code
    dependencies: []
    files:
      create:
        - packages/web/src/pages/project-detail.tsx
        - packages/web/src/components/project/pipeline-status.tsx
        - packages/web/src/components/project/project-header.tsx
      modify:
        - packages/web/src/router.tsx
    style_anchor_refs:
      - SA-012
      - SA-013
    instructions: |
      **Objective:**
      Build the project detail page with pipeline status visualization.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-012.md` — shadcn Dashboard card patterns
      - See `artifacts/style-anchors/SA-013.md` — React 19 composition patterns (use hook, Suspense)

      **Implementation Steps:**
      1. Create `packages/web/src/pages/project-detail.tsx`:
         - Use React Router's useParams to extract project ID
         - Fetch project data via API hook (useProject from m5 or new useQuery)
         - Render project header, pipeline status, milestone list placeholder
         - Wrap data fetch in Suspense with skeleton loader fallback
         - Handle 404 and error states with appropriate UI
      2. Create `packages/web/src/components/project/project-header.tsx`:
         - Display project name, description, created date, status badge
         - Use shadcn/ui Card as container
         - Breadcrumb navigation: Home > Projects > {name}
      3. Create `packages/web/src/components/project/pipeline-status.tsx`:
         - Visual stepper showing pipeline stages (e.g., gap-analysis →
           business-requirements → technical-requirements → implementation →
           qa → complete)
         - Highlight current stage, dim completed stages, grey out upcoming
         - Use shadcn/ui Badge for stage labels
         - Responsive layout — horizontal on desktop, vertical on mobile
      4. Update `packages/web/src/router.tsx`:
         - Add route: /projects/:id → ProjectDetail page
         - Protect route with auth guard

      **Constraints:**
      - ONLY use: shadcn/ui components (Card, Badge, Skeleton)
      - ONLY use: Tailwind utility classes for layout
      - Pipeline stages must be derived from project data, not hardcoded
      - Handle loading state with skeleton placeholders
      - Handle error state with user-friendly message

      **Success Criteria:**
      - Navigating to /projects/:id loads project detail
      - Pipeline status stepper renders correctly for all stage combinations
      - Loading skeleton shown while data fetches
      - Error state displayed for invalid project IDs
      - Responsive layout works on mobile and desktop

