      modify:
        - packages/api/src/server.ts
    style_anchor_refs:
      - SA-004
      - SA-005
    instructions: |
      **Objective:**
      Create RPC endpoints for scheduling and Sherpy flow operations following
      existing API patterns.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-004.md` — HttpApiGroup + HttpApiEndpoint
      - See `artifacts/style-anchors/SA-005.md` — Handler implementation

      **Implementation Steps:**
      1. Create `packages/api/src/api/routes/schedule.ts`:
         - Define schedule HttpApiGroup.make("schedule") (**SA-004**)
         - Endpoints:
           - POST /api/schedule/generate: generate schedule for a project
             Request: { projectId }
             Response: ScheduleSnapshot
           - POST /api/schedule/scenario: create planning scenario
             Request: { projectId, modification: ScenarioModification }
             Response: ScheduleSnapshot
           - POST /api/schedule/compare: compare multiple scenarios
             Request: { snapshotIds: string[] }
             Response: ScenarioComparison
           - POST /api/schedule/reschedule: what-if reschedule after disruption
             Request: { projectId, disruption: Disruption }
             Response: ScheduleSnapshot
           - POST /api/schedule/analyze-disruption: analyze disruption impact
             Request: { projectId, disruption: Disruption }
             Response: DisruptionAnalysis
           - POST /api/schedule/apply: apply a schedule snapshot
             Request: { snapshotId }
             Response: { assignments: Assignment[] }
           - POST /api/schedule/explain: explain a schedule
             Request: { snapshotId }
             Response: ScheduleExplanation
           - GET /api/schedule/history/:projectId: list schedule snapshots
             Response: ScheduleSnapshot[]
           - GET /api/schedule/latest/:projectId: get latest schedule
             Response: ScheduleSnapshot | null
         - Implement handlers using HttpApiBuilder.group (**SA-005**)
         - Use Effect.gen in handlers to access ScheduleService, ScenarioService, etc.
         - All endpoints require authentication (bearer JWT)
      2. Create `packages/api/src/api/routes/sherpy-flow.ts`:
         - Define sherpyFlow HttpApiGroup.make("sherpy-flow") (**SA-004**)
         - Endpoints:
           - POST /api/flow/message: send message to Sherpy flow chat
             Request: { projectId, message }
             Response: FlowResponse (reply, suggestedAction, stepComplete, nextStep)
           - POST /api/flow/transition: transition pipeline step
             Request: { projectId, nextStep }
             Response: { success: boolean }
           - GET /api/flow/guidance/:projectId: get current step guidance
             Response: StepGuidance
         - Implement handlers (**SA-005**)
      3. Update `packages/api/src/server.ts`:
         - Register schedule and sherpy-flow groups with the main HttpApi
         - Add authentication middleware to both groups

      **Constraints:**
      - ONLY use: HttpApiGroup + HttpApiEndpoint (**SA-004**)
      - Follow **SA-005** for handler implementations with Effect.gen
      - All endpoints use schema-validated request/response
      - All endpoints require authentication
      - Schedule generation endpoints should have longer timeout (60s)
      - Follow existing error handling patterns with TaggedErrors

      **Success Criteria:**
      - All schedule endpoints respond with schema-validated data
      - Sherpy flow endpoints process messages and return step-aware responses
      - Authentication required on all endpoints
      - Error responses use TaggedErrors with correct HTTP status codes

