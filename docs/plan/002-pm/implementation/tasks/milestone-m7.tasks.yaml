         - Dependencies: AIService, ScheduleRepository
         - Methods:
           - explainSchedule(snapshotId: string): Effect<ScheduleExplanation, AIServiceError>
             1. Load schedule snapshot from database
             2. Build explanation prompt with schedule data
             3. Call AIService.generateExplanation with schedule context
             4. Return structured explanation (summary, keyDecisions, constraints, assumptions, recommendations)
           - explainAssignment(snapshotId: string, taskId: string): Effect<AssignmentExplanation, AIServiceError>
             1. Load schedule snapshot and find specific assignment
             2. Build focused prompt for that assignment
             3. Return explanation with: why this person, alternatives considered, risk factors
           - explainConflict(snapshotId: string, conflictIndex: number): Effect<ConflictExplanation, AIServiceError>
             Focus on a specific conflict from the schedule and explain resolution
         - Layer composition: AIService + ScheduleRepository → ExplanationService
      3. Update `packages/api/src/services/schedule/index.ts` to export ExplanationService

      **Constraints:**
      - ONLY use: AIService for explanation generation
      - Follow **SA-001** for service pattern
      - Explanations must be in clear, non-technical language
      - Must handle edge case: schedule with no conflicts or no assignments
      - Explanation cached in snapshot's reasoning field to avoid regenerating

      **Success Criteria:**
