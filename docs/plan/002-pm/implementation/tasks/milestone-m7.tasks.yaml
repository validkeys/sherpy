    instructions: |
      **Objective:**
      Implement AI-generated schedule explanations that help users understand
      scheduling decisions in natural language.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-001.md` — Effect.Service with Layer DI

      **Implementation Steps:**
      1. Create `packages/api/src/services/ai/prompts/explanation-prompts.ts`:
         - Build explanation prompt template:
           - Include full schedule data (assignments, constraints, conflicts)
           - Ask for: summary, key decisions with reasoning, constraints addressed,
