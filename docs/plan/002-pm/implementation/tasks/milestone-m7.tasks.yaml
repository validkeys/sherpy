tasks:
  - id: m7-001
    name: "Create AIService with Bedrock integration via Vercel AI SDK"
    description: |
      Implement the core AIService using Effect.Service that wraps the Vercel AI SDK
      with @ai-sdk/amazon-bedrock provider. This is the foundational AI service that
      all scheduling, scenario, and Sherpy flow features depend on. Configure model
      selection via Effect Config, implement generateText and generateObject wrappers
      with proper error handling, and expose a clean Effect-based API.
    estimate_minutes: 90
    type: code
    dependencies: []
    files:
      create:
        - packages/api/src/services/ai/ai-service.ts
        - packages/api/src/services/ai/bedrock-config.ts
        - packages/api/src/services/ai/errors.ts
        - packages/api/src/services/ai/index.ts
      modify:
        - packages/api/src/services/index.ts
    style_anchor_refs:
      - SA-001
    instructions: |
      **Objective:**
      Create the AIService as an Effect.Service wrapping Vercel AI SDK with
      Bedrock provider, providing a clean Effect-based interface for all AI
      operations in the system.

      **TDD Approach:** Write failing test for AIService.generateText with
      mocked Bedrock response before implementing. Test error mapping
      (Bedrock errors → AIServiceError) before implementing error handling.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-001.md` — Effect.Service with Layer DI

      **Implementation Steps:**
      1. Create `packages/api/src/services/ai/errors.ts`:
         - AIServiceError extends Schema.TaggedError with _tag: "AIServiceError"
           and fields: message, cause?, model
         - AIRateLimitError extends Schema.TaggedError with _tag: "AIRateLimitError"
           and fields: message, retryAfter
         - AIModelNotConfiguredError extends Schema.TaggedError with _tag: "AIModelNotConfiguredError"
         - Each error type annotated with HttpApiSchema.annotations for status codes
      2. Create `packages/api/src/services/ai/bedrock-config.ts`:
         - BedrockConfig using Schema.Struct with fields:
           modelId (string, e.g., "anthropic.claude-sonnet-4-20250514"),
           region (string, default "us-east-1"),
           maxTokens (number, default 4096),
           temperature (number, default 0.7)
         - Load from Effect.Config: BEDROCK_MODEL_ID, AWS_REGION, BEDROCK_MAX_TOKENS
      3. Create `packages/api/src/services/ai/ai-service.ts`:
         - AIService using Effect.Service pattern (**SA-001**)
         - Methods:
           - generateText(prompt: string, options?: AiTextOptions): Effect<string, AIServiceError>
             Wraps Vercel AI SDK generateText with bedrock model
           - generateObject<T>(prompt: string, schema: ZodSchema | Schema.Schema<T>): Effect<T, AIServiceError>
             Wraps Vercel AI SDK generateObject for structured output
           - streamText(prompt: string, options?: AiTextOptions): Stream<string>
             Wraps Vercel AI SDK streamText for streaming responses
         - Create bedrock model instance using @ai-sdk/amazon-bedrock provider:
           `bedrock(modelId)` from @ai-sdk/amazon-bedrock
         - Layer composition: BedrockConfig → AIService
         - Wrap all AI SDK calls in Effect.tryPromise, mapping errors to AIServiceError
         - Add request timeout via Effect.timeout (30 seconds default)
      4. Create `packages/api/src/services/ai/index.ts` barrel export
      5. Update `packages/api/src/services/index.ts` to export AIService

      **Constraints:**
      - ONLY use: Vercel AI SDK (ai package) with @ai-sdk/amazon-bedrock
      - NEVER use: AWS SDK directly — go through Vercel AI SDK provider
      - Follow **SA-001** for Effect.Service with Layer pattern
      - Model ID configurable via environment, never hardcoded
      - All AI calls must have timeout protection
      - Credentials managed via standard AWS credential chain (env, ~/.aws, etc.)

      **Success Criteria:**
      - AIService compiles with Effect.Service pattern
      - generateText returns string responses from Bedrock
      - generateObject returns typed structured output
      - Errors mapped to TaggedErrors, not thrown exceptions
      - Layer composition provides config → service correctly

  - id: m7-002
    name: "Implement structured output generation for schedule data"
    description: |
      Define Zod schemas for structured AI output types (schedules, assignments,
      scenarios) and implement the structured generation methods on AIService.
      Use Vercel AI SDK's generateObject with output schemas to ensure AI returns
      parseable, type-safe schedule data.
    estimate_minutes: 60
    type: code
    dependencies: [m7-001]
    files:
      create:
        - packages/api/src/services/ai/schemas/schedule-output.ts
        - packages/api/src/services/ai/schemas/scenario-output.ts
        - packages/api/src/services/ai/schemas/explanation-output.ts
        - packages/api/src/services/ai/schemas/index.ts
      modify:
        - packages/api/src/services/ai/ai-service.ts
    style_anchor_refs:
      - SA-001
    instructions: |
      **Objective:**
      Define structured output schemas and implement typed generation methods
      for schedule data, scenarios, and explanations using Vercel AI SDK's
      generateObject.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-001.md` — Effect.Service pattern

      **Implementation Steps:**
      1. Create `packages/api/src/services/ai/schemas/schedule-output.ts`:
         - Zod schema for AI schedule output:
           - assignments: array of { taskId, personId, personName, startDate, endDate, allocationPercentage, rationale }
           - conflicts: array of { type, description, affectedTasks, severity }
           - utilization: object with per-person utilization percentages
           - overallFeasibility: "feasible" | "constrained" | "infeasible"
           - confidenceScore: number (0-1)
         - Export zod schema and inferred TypeScript type
      2. Create `packages/api/src/services/ai/schemas/scenario-output.ts`:
         - Zod schema for planning scenario:
           - scenarioName, description
           - modifiedAssignments: same shape as schedule assignments
           - impactAnalysis: { affectedProjects, timelineChanges, riskLevel, summary }
           - tradeoffs: array of { description, pros, cons }
      3. Create `packages/api/src/services/ai/schemas/explanation-output.ts`:
         - Zod schema for schedule explanation:
           - summary: string (2-3 sentence overview)
           - keyDecisions: array of { decision, reasoning, affectedTasks }
           - constraints: array of { constraint, howAddressed }
           - assumptions: string[]
           - recommendations: string[]
      4. Create `packages/api/src/services/ai/schemas/index.ts` barrel export
      5. Update `packages/api/src/services/ai/ai-service.ts`:
         - Add generateSchedule(projectContext: string): Effect<ScheduleOutput, AIServiceError>
           using generateObject with schedule-output schema
         - Add generateScenario(projectContext: string, modification: string): Effect<ScenarioOutput, AIServiceError>
           using generateObject with scenario-output schema
         - Add generateExplanation(scheduleData: string): Effect<ExplanationOutput, AIServiceError>
           using generateObject with explanation-output schema

      **Constraints:**
      - ONLY use: Zod schemas for Vercel AI SDK generateObject output parameter
      - NEVER use: raw string parsing — generateObject handles validation
      - All output schemas must have a corresponding TypeScript type export
      - Schemas must handle edge cases (empty assignments, missing optionals)

      **Success Criteria:**
      - All Zod schemas compile and validate correctly
      - generateSchedule returns typed ScheduleOutput from AI
      - generateScenario returns typed ScenarioOutput from AI
      - generateExplanation returns typed ExplanationOutput from AI
      - Invalid AI responses caught and mapped to AIServiceError

  - id: m7-003
    name: "Implement Sherpy flow orchestration through chat"
    description: |
      Build the Sherpy flow orchestration service that drives the planning
      pipeline steps through per-project chat. The AI guides users through
      pipeline stages (intake → scoping → planning → review → scheduling →
      active) conversationally, collecting information and making suggestions
      at each step. Integrates with the existing chat session infrastructure
      from m6.
    estimate_minutes: 90
    type: code
    dependencies: [m7-001]
    files:
      create:
        - packages/api/src/services/ai/sherpy-flow-service.ts
        - packages/api/src/services/ai/flow-steps.ts
        - packages/api/src/services/ai/prompts/sherpy-flow-system.ts
        - packages/api/src/services/ai/prompts/flow-step-prompts.ts
      modify:
        - packages/api/src/services/ai/index.ts
    style_anchor_refs:
      - SA-001
    instructions: |
      **Objective:**
      Implement the Sherpy flow orchestration that drives planning pipeline
      steps through conversational AI chat, guiding users from intake through
      scheduling.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-001.md` — Effect.Service with Layer DI

      **Implementation Steps:**
      1. Create `packages/api/src/services/ai/flow-steps.ts`:
         - Define SherpyFlowStep as Schema.Literal union:
           "intake", "scoping", "planning", "review", "scheduling", "active", "archived"
         - Define FlowStepConfig with:
           step: SherpyFlowStep
           systemPrompt: string
           requiredData: string[] (what info this step needs)
           nextStep: SherpyFlowStep
           completionCriteria: string (natural language description)
         - Export flowSteps: Record<SherpyFlowStep, FlowStepConfig> with all pipeline steps
      2. Create `packages/api/src/services/ai/prompts/sherpy-flow-system.ts`:
         - System prompt for Sherpy flow AI assistant:
           - Role: expert project management assistant
           - Context: project data from DB (milestones, tasks, people)
           - Behavior: guide through current flow step, collect missing info,
             suggest next actions, detect when step is complete
           - Tone: professional, concise, action-oriented
         - Export function buildSystemPrompt(step: SherpyFlowStep, projectContext: ProjectContext): string
      3. Create `packages/api/src/services/ai/prompts/flow-step-prompts.ts`:
         - Per-step prompt templates:
           - Intake: gather project overview, goals, constraints, team
           - Scoping: define milestones, deliverables, rough timeline
           - Planning: break milestones into tasks, estimate effort, assign people
           - Review: validate plan against constraints, surface risks
           - Scheduling: generate optimized schedule, show conflicts
           - Active: monitor progress, flag delays, suggest adjustments
         - Each template includes instructions for what to collect and how to respond
      4. Create `packages/api/src/services/ai/sherpy-flow-service.ts`:
         - SherpyFlowService using Effect.Service (**SA-001**)
         - Dependencies: AIService, ProjectRepository, ChatSessionRepository
         - Methods:
           - processMessage(projectId: string, message: string): Effect<FlowResponse, AIServiceError>
             1. Load project context (milestones, tasks, people, assignments)
             2. Determine current flow step from project pipelineStatus
             3. Build system prompt with project context + step-specific prompt
             4. Call AIService.generateText with full conversation context
             5. Analyze response for step completion signals
             6. If step complete, suggest pipeline status transition
             7. Return FlowResponse with { reply, suggestedAction?, stepComplete?, nextStep? }
           - getStepGuidance(projectId: string): Effect<StepGuidance, AIServiceError>
             Returns current step info, what data is needed, what's missing
           - transitionStep(projectId: string, nextStep: SherpyFlowStep): Effect<void, AIServiceError>
             Updates project pipelineStatus and initializes next step context
         - Layer composition: AIService + repositories → SherpyFlowService
      5. Update `packages/api/src/services/ai/index.ts` to export SherpyFlowService

      **Constraints:**
      - ONLY use: AIService for all AI calls (never call Vercel AI SDK directly)
      - Follow **SA-001** for Effect.Service with Layer DI
      - Pipeline status transitions must go through ProjectRepository (DB is source of truth)
      - System prompts must include project context from DB, not from user messages
      - AI must never auto-transition pipeline status — always suggest and require confirmation
      - Manual override always available: users can skip steps or go back

      **Success Criteria:**
      - SherpyFlowService processes chat messages with project context
      - AI responses are step-aware (different guidance per pipeline stage)
      - Step completion detection works for basic cases
      - Pipeline status transitions require user confirmation
      - Users can manually override any AI suggestion

  - id: m7-004
    name: "Create ScheduleService with generation and snapshots"
    description: |
      Implement the ScheduleService using Effect.Service that orchestrates
      schedule generation via AIService and persists schedule snapshots to the
      database. Handles schedule generation from project data, saving snapshots
      with full parameters and results, and retrieving schedule history.
    estimate_minutes: 60
    type: code
    dependencies: [m7-001]
    files:
      create:
        - packages/api/src/services/schedule/schedule-service.ts
        - packages/api/src/services/schedule/schedule-repository.ts
        - packages/api/src/services/schedule/index.ts
      modify:
        - packages/api/src/services/index.ts
    style_anchor_refs:
      - SA-001
      - SA-002
    instructions: |
      **Objective:**
      Create the ScheduleService for generating schedules via AI and managing
      schedule snapshots in the database.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-001.md` — Effect.Service with Layer DI
      - See `artifacts/style-anchors/SA-002.md` — Model.Class with makeRepository

      **Implementation Steps:**
      1. Create `packages/api/src/services/schedule/schedule-repository.ts`:
         - Use ScheduleSnapshot Model.Class from shared schemas (already defined in m1)
         - Create repository using makeRepository pattern (**SA-002**)
         - Methods: insert, findById, findByProjectId, findLatestByProject
         - Use SqlResolver for queries (**SA-003**):
           - ByProjectId: selects by project_id ordered by created_at DESC
           - LatestByProject: selects most recent snapshot for a project
           - ByProjectAndType: filters by project_id and type (full/scenario/what-if)
      2. Create `packages/api/src/services/schedule/schedule-service.ts`:
         - ScheduleService using Effect.Service (**SA-001**)
         - Dependencies: AIService, ScheduleRepository, ProjectRepository,
           TaskRepository, PersonRepository, AssignmentRepository
         - Methods:
           - generateSchedule(projectId: string): Effect<ScheduleSnapshot, AIServiceError>
             1. Load project context: milestones, tasks, people, skills, availability
             2. Build scheduling prompt with all constraints:
                - Task dependencies and effort estimates
                - People skills, capacity, and availability windows
                - Existing assignments across all projects
                - Project priority and deadlines
             3. Call AIService.generateSchedule(projectContext)
             4. Save result as schedule snapshot (type: "full")
             5. Return saved snapshot
           - saveSnapshot(projectId: string, name: string, type: string, parameters: unknown, result: unknown, reasoning: string): Effect<ScheduleSnapshot, never>
             Persists a schedule snapshot to the database
           - getScheduleHistory(projectId: string): Effect<readonly ScheduleSnapshot[], never>
             Returns all snapshots for a project ordered by recency
           - getLatestSchedule(projectId: string): Effect<ScheduleSnapshot | null, never>
             Returns the most recent schedule snapshot
           - applySchedule(snapshotId: string): Effect<readonly Assignment[], never>
             Applies a schedule snapshot by creating assignments from the AI output
             Only applies if no conflicting assignments exist
         - Layer composition: AIService + all repositories → ScheduleService
      3. Create `packages/api/src/services/schedule/index.ts` barrel export
      4. Update `packages/api/src/services/index.ts` to export schedule services

      **Constraints:**
      - ONLY use: AIService for schedule generation (never call AI directly)
      - Follow **SA-001** for ScheduleService Effect.Service pattern
      - Follow **SA-002** for repository with Model.Class makeRepository
      - Follow **SA-003** for SqlResolver query patterns
      - Schedule generation must include all project constraints in prompt
      - Snapshots are immutable — never update, only create new ones
      - applySchedule must validate against existing assignments before applying
      - Users must confirm before applying a schedule (manual override)

      **Success Criteria:**
      - ScheduleService generates schedules via AI with full project context
      - Schedule snapshots persisted to database with parameters and results
      - Schedule history retrievable by project
      - applySchedule creates valid assignments from AI output
      - Existing assignments checked before applying new schedule

  - id: m7-005
    name: "Implement planning scenario creation and comparison"
    description: |
      Build scenario creation and comparison features that allow users to
      explore different planning options. Users can create "what would happen
      if" scenarios (e.g., add a person, change a deadline, reprioritize) and
      compare them side-by-side with the current schedule.
    estimate_minutes: 60
    type: code
    dependencies: [m7-001]
    files:
      create:
        - packages/api/src/services/schedule/scenario-service.ts
        - packages/api/src/services/ai/prompts/scenario-prompts.ts
      modify:
        - packages/api/src/services/schedule/index.ts
    style_anchor_refs:
      - SA-001
      - SA-003
    instructions: |
      **Objective:**
      Implement planning scenario creation and comparison for exploring
      different scheduling options.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-001.md` — Effect.Service with Layer DI
      - See `artifacts/style-anchors/SA-003.md` — SqlResolver patterns

      **Implementation Steps:**
      1. Create `packages/api/src/services/ai/prompts/scenario-prompts.ts`:
         - Build scenario creation prompt template:
           - Include current schedule state
           - Describe the modification to explore
           - Ask for impact analysis across all affected projects
           - Request tradeoff analysis (pros/cons)
         - Build scenario comparison prompt template:
           - Include two or more schedule snapshots
           - Ask for comparative analysis
           - Highlight key differences and recommendations
      2. Create `packages/api/src/services/schedule/scenario-service.ts`:
         - ScenarioService using Effect.Service (**SA-001**)
         - Dependencies: AIService, ScheduleService, ScheduleRepository,
           ProjectRepository, PersonRepository
         - Methods:
           - createScenario(projectId: string, modification: ScenarioModification): Effect<ScheduleSnapshot, AIServiceError>
             1. Load current schedule and project context
             2. Build scenario prompt with current state + proposed modification
                modification types: addPerson, removePerson, changeDeadline,
                reprioritize, splitProject, mergeProjects
             3. Call AIService.generateScenario with context
             4. Save result as schedule snapshot (type: "scenario")
             5. Return saved scenario snapshot
           - compareScenarios(snapshotIds: string[]): Effect<ScenarioComparison, AIServiceError>
             1. Load all specified snapshots
             2. Build comparison prompt with all scenario data
             3. Call AIService for comparative analysis
             4. Return structured comparison with:
                - keyDifferences, riskAnalysis, recommendation, tradeoffs
           - listScenarios(projectId: string): Effect<readonly ScheduleSnapshot[], never>
             Returns all scenario-type snapshots for a project
           - promoteScenario(snapshotId: string): Effect<ScheduleSnapshot, AIServiceError>
             Creates a new "full" snapshot from a scenario, making it the active schedule
         - Layer composition: AIService + ScheduleService + repositories → ScenarioService
      3. Update `packages/api/src/services/schedule/index.ts` to export ScenarioService

      **Constraints:**
      - ONLY use: AIService for AI operations
      - Follow **SA-001** for service pattern
      - Scenario snapshots are immutable and type: "scenario"
      - Promoting a scenario creates a new "full" snapshot (doesn't mutate)
      - Comparison must include risk analysis and clear recommendation
      - Manual override: users can accept, modify, or reject any scenario

      **Success Criteria:**
      - createScenario produces valid scenarios from proposed modifications
      - compareScenarios returns meaningful analysis of differences
      - Scenarios stored as snapshots and retrievable
      - promoteScenario creates a new full schedule from scenario data
      - Users can freely create and compare scenarios without affecting live schedule

  - id: m7-006
    name: "Implement what-if rescheduling after delays"
    description: |
      Build the what-if rescheduling feature that recalculates schedules when
      disruptions occur (delays, unavailability, scope changes). Takes a
      disruption description, analyzes impact on current schedule, and proposes
      a revised schedule with minimal cascading effects.
    estimate_minutes: 60
    type: code
    dependencies: [m7-001]
    files:
      create:
        - packages/api/src/services/schedule/reschedule-service.ts
        - packages/api/src/services/ai/prompts/reschedule-prompts.ts
      modify:
        - packages/api/src/services/schedule/index.ts
    style_anchor_refs:
      - SA-001
    instructions: |
      **Objective:**
      Implement what-if rescheduling for handling delays and disruptions
      to active schedules.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-001.md` — Effect.Service with Layer DI

      **Implementation Steps:**
      1. Create `packages/api/src/services/ai/prompts/reschedule-prompts.ts`:
         - Build reschedule prompt template:
           - Include current schedule with all assignments
           - Describe the disruption (delayed task, unavailable person, scope change)
           - Constraints: minimize changes to unaffected tasks, respect priorities
           - Request: revised assignments, impact summary, risk assessment
         - Disruption types:
           - TaskDelay: task took longer than estimated
           - PersonUnavailable: person on PTO or reassigned
           - ScopeChange: task added, removed, or reestimated
           - DependencyBlocked: upstream task blocked
      2. Create `packages/api/src/services/schedule/reschedule-service.ts`:
         - RescheduleService using Effect.Service (**SA-001**)
         - Dependencies: AIService, ScheduleService, AssignmentRepository,
           TaskRepository, PersonRepository, AvailabilityRepository
         - Methods:
           - analyzeDisruption(projectId: string, disruption: Disruption): Effect<DisruptionAnalysis, AIServiceError>
             1. Load current schedule and assignments
             2. Assess impact: which tasks are affected, cascading delays
             3. Call AIService with disruption context
             4. Return analysis with: affectedTasks, estimatedDelay, riskLevel, suggestedActions
           - reschedule(projectId: string, disruption: Disruption): Effect<ScheduleSnapshot, AIServiceError>
             1. Load full project context + disruption details
             2. Build reschedule prompt emphasizing minimal disruption
             3. Call AIService.generateSchedule with reschedule context
             4. Save result as schedule snapshot (type: "what-if")
             5. Return revised schedule snapshot
           - applyReschedule(snapshotId: string): Effect<void, never>
             Validates and applies a what-if reschedule (delegates to ScheduleService.applySchedule)
         - Disruption type defined as Schema.Struct union:
           - { type: "task-delay", taskId, additionalDays }
           - { type: "person-unavailable", personId, startDate, endDate, reason }
           - { type: "scope-change", taskId, newEstimate?, addedTasks?, removedTaskIds? }
           - { type: "dependency-blocked", taskId, blockedByTaskId, reason }
         - Layer composition: AIService + ScheduleService + repositories → RescheduleService
      3. Update `packages/api/src/services/schedule/index.ts` to export RescheduleService

      **Constraints:**
      - ONLY use: AIService for AI operations
      - Follow **SA-001** for service pattern
      - Reschedule must minimize changes to unaffected tasks
      - What-if snapshots are type: "what-if" and don't affect live schedule until applied
      - Manual override: users can modify any AI-proposed reschedule before applying
      - Disruption analysis must be available before committing to reschedule

      **Success Criteria:**
      - analyzeDisruption identifies affected tasks and cascading impact
      - reschedule produces a revised schedule respecting constraints
      - What-if snapshots saved separately from full schedules
      - Users can review disruption analysis before requesting reschedule
      - Applied reschedules update assignments via existing applySchedule flow

