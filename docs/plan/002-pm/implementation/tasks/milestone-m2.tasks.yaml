  - id: m2-006
    name: "Implement CLI start command"
    description: |
      Create the CLI start command that spawns the API daemon as a detached
      child process, tracks the PID, and opens the browser to the web UI.
    estimate_minutes: 60
    type: code
    dependencies: [m2-001]
    files:
      create:
        - packages/cli/src/commands/start.ts
      modify:
        - packages/cli/src/daemon.ts
        - packages/cli/src/index.ts
    instructions: |
      **Objective:**
      Implement the CLI start command for daemon lifecycle management.

      **Implementation Steps:**
      1. Create `packages/cli/src/commands/start.ts`:
         - Check if daemon already running (read PID file at ~/.sherpy/sherpy.pid)
         - If running, report status and exit
         - If not running, spawn API daemon:
           - Use child_process.spawn with detached: true, stdio: 'ignore'
           - Build API package first if needed
           - Set NODE_ENV, PORT, and DB path as environment variables
           - Write child PID to ~/.sherpy/sherpy.pid
           - unref() child process so CLI can exit
         - Open browser to http://localhost:{PORT} using platform opener
         - Report "Sherpy started on http://localhost:{PORT}"
      2. Update daemon.ts with PID file management:
         - readPid(): reads PID from file, checks if process alive
         - writePid(pid): writes PID to file
         - removePid(): removes PID file
      3. Update index.ts to route "start" command

      **Constraints:**
      - ONLY use: Node.js child_process for daemon spawning
      - PID file at ~/.sherpy/sherpy.pid
      - Database at ~/.sherpy/sherpy.db
      - Detect already-running daemon to prevent duplicates

      **Success Criteria:**
      - `sherpy start` spawns API daemon process
      - PID file created and process survives CLI exit
      - Browser opens to web UI URL
      - Running `sherpy start` again reports already running
      - Daemon accessible at http://localhost:{PORT}

  - id: m2-007
    name: "Implement CLI stop command"
    description: |
      Create the CLI stop command that reads the PID, sends SIGTERM for
      graceful shutdown, waits for confirmation, and cleans up the PID file.
    estimate_minutes: 45
    type: code
    dependencies: [m2-006]
    files:
      create:
        - packages/cli/src/commands/stop.ts
      modify:
        - packages/cli/src/daemon.ts
        - packages/cli/src/index.ts
    instructions: |
      **Objective:**
      Implement the CLI stop command for graceful daemon shutdown.

      **Implementation Steps:**
      1. Create `packages/cli/src/commands/stop.ts`:
         - Read PID from ~/.sherpy/sherpy.pid
         - If no PID file, report "Sherpy is not running" and exit
         - Check if process exists (process.kill(pid, 0))
         - Send SIGTERM to the daemon process
         - Wait up to 10 seconds for process to exit (poll every 500ms)
         - If process doesn't exit, send SIGKILL
         - Remove PID file on successful shutdown
         - Report "Sherpy stopped"
      2. Update daemon.ts with graceful shutdown helpers
      3. Update index.ts to route "stop" command

      **Constraints:**
      - ONLY use: SIGTERM for graceful shutdown, SIGKILL as last resort
      - Wait for process to exit before removing PID file
      - Handle edge case: PID file exists but process doesn't

      **Success Criteria:**
      - `sherpy stop` gracefully terminates daemon process
      - PID file cleaned up on shutdown
      - Handles already-stopped daemon gracefully
      - No orphaned processes after stop

