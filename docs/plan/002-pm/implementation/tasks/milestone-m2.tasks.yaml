  - id: m2-001
    name: "Create HTTP server bootstrap with Effect platform"
    description: |
      Set up the Effect-TS HTTP server using @effect/platform-node. Create
      the server bootstrap that loads all layers, runs migrations, and starts
      listening on 127.0.0.1 with a configurable port.
    estimate_minutes: 60
    type: code
    dependencies: []
    files:
      create:
        - packages/api/src/server.ts
      modify:
        - packages/api/src/index.ts
    style_anchor_refs:
      - SA-001
      - SA-004
    instructions: |
      **Objective:**
      Create the HTTP server bootstrap using Effect-TS platform.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-004.md` — HttpApi definition
      - See `artifacts/style-anchors/SA-001.md` — Effect.Service Layer composition

      Reference files:
      - `~/Sites/ai-use-repos/effect/packages/platform-node/examples/api.ts:1-122` — API server example

      **Implementation Steps:**
      1. Create `packages/api/src/server.ts`:
         - Define HttpApi with groups for each domain area
         - Use NodeHttpServer.layer from @effect/platform-node
         - Bind to 127.0.0.1 with port from Config.integer("PORT").withDefault(3100)
         - Use HttpApiBuilder.serve(HttpMiddleware.logger) for request logging
         - Layer composition: MigrationRunner → SqlClient → HttpApi → Server
      2. Update `packages/api/src/index.ts`:
         - Export main Effect that bootstraps and runs the server
         - Use NodeRuntime.runMain to execute

      **Constraints:**
      - ONLY use: @effect/platform-node for HTTP server
      - Follow **SA-004** for HttpApi definition
      - Follow **SA-001** for Layer composition
      - Server binds to 127.0.0.1 ONLY (never 0.0.0.0)
      - Port configurable via PORT environment variable

      **Success Criteria:**
      - Server starts and listens on configured port
      - Health endpoint accessible at GET /api/health
      - Layer composition chains correctly (migrations run, then server starts)
      - Server startup completes within 3 seconds

  - id: m2-002
    name: "Implement Okta OIDC JWT validation middleware"
    description: |
      Create authentication middleware that validates Okta OIDC JWTs on every
      /api/* request. Fetches Okta's public JWKS endpoint to verify token
      signatures. Tokens are sent from the SPA frontend via Authorization header.
    estimate_minutes: 90
    type: code
    dependencies: [m2-001]
    files:
      create:
        - packages/api/src/auth/okta-jwt.ts
        - packages/api/src/auth/jwks-cache.ts
    style_anchor_refs:
      - SA-004
      - SA-007
    instructions: |
      **Objective:**
      Implement Okta JWT validation middleware for all API endpoints.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-004.md` — HttpApiMiddleware with bearer security

      **Implementation Steps:**
      1. Create `packages/api/src/auth/jwks-cache.ts`:
         - AuthService using Effect.Service (**SA-001**)
         - Fetches Okta JWKS from ${OKTA_DOMAIN}/.well-known/jwks.json
         - Caches JWKS with TTL (1 hour default)
         - Uses Effect.Config for OKTA_DOMAIN and OKTA_CLIENT_ID
      2. Create `packages/api/src/auth/okta-jwt.ts`:
         - Validates JWT signature using cached JWKS
         - Verifies: issuer matches OKTA_DOMAIN, audience matches OKTA_CLIENT_ID,
           token not expired
         - Extracts user claims (sub, email, name) from verified token
         - Returns typed OktaClaims object or fails with UnauthorizedError
      3. Create HttpApiMiddleware that applies to all /api/* endpoints:
         - Extracts Bearer token from Authorization header
         - Validates token via AuthService
         - Attaches OktaClaims to request context
         - Exempts GET /api/health from auth

      **Constraints:**
      - ONLY use: Okta JWKS endpoint for signature verification
      - NEVER use: client_secret in local mode (PKCE flow)
      - Follow **SA-004** for middleware integration with HttpApi
      - Follow **SA-007** for UnauthorizedError TaggedError
      - Cache JWKS to avoid fetching on every request

      **Success Criteria:**
      - Valid Okta JWT passes validation and extracts claims
      - Expired or invalid tokens rejected with 401
      - JWKS cached and refreshed on TTL expiry
      - Health endpoint accessible without authentication

  - id: m2-003
    name: "Create health check endpoint"
    description: |
      Implement a simple health check endpoint that returns server status,
      database connectivity, and uptime. No authentication required.
    estimate_minutes: 30
    type: code
    dependencies: [m2-001]
    files:
      create:
        - packages/api/src/api/routes/health.ts
      modify:
        - packages/api/src/server.ts
    style_anchor_refs:
      - SA-004
      - SA-005
    instructions: |
      **Objective:**
      Create the health check endpoint.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-004.md` — HttpApiEndpoint definition
      - See `artifacts/style-anchors/SA-005.md` — Handler implementation

      **Implementation Steps:**
      1. Create health API group with HttpApiGroup.make("health")
      2. Define GET /api/health endpoint using HttpApiEndpoint.get("health", "/api/health")
      3. Handler checks database connectivity (simple SELECT 1)
      4. Returns { status: "ok", db: "connected", uptime: number, timestamp: string }
      5. No authentication middleware applied to this group
      6. Register health group with the main HttpApi

      **Constraints:**
      - ONLY use: HttpApiGroup and HttpApiEndpoint (**SA-004**)
      - Follow **SA-005** for handler implementation
      - No auth required — this is the only unauthenticated endpoint

      **Success Criteria:**
      - GET /api/health returns 200 with status object
      - Database connectivity verified in health check
      - Response time under 50ms

  - id: m2-004
    name: "Create WebSocket endpoint for real-time events"
    description: |
      Implement the WebSocket endpoint at /ws that accepts connections with
      JWT authentication, maintains connection state, and broadcasts events
      to all connected clients.
    estimate_minutes: 90
    type: code
    dependencies: [m2-002]
    files:
      create:
        - packages/api/src/api/websocket.ts
    style_anchor_refs:
      - SA-004
      - SA-005
    instructions: |
      **Objective:**
      Create the WebSocket endpoint for real-time dashboard updates.

      **Implementation Steps:**
      1. Create WebSocket handler at /ws path
      2. On connect:
         - Extract JWT from first message or query parameter
         - Validate JWT via AuthService
         - Add connection to connection pool (Set<WebSocket>)
         - Send acknowledgment message
      3. On disconnect:
         - Remove connection from pool
         - Log disconnection
      4. Create EventBroadcaster service using Effect.Service (**SA-001**):
         - broadcast(event: WsEvent) — sends to all connected clients
         - Serializes event using Schema.encode(WsEvent)
      5. Event types from shared/src/events/ws-events.ts

      **Constraints:**
      - ONLY use: @effect/platform WebSocket support
      - Simple broadcast for v1 (all events to all clients)
      - JWT must be validated on WebSocket connect
      - Follow **SA-001** for EventBroadcaster service

      **Success Criteria:**
      - WebSocket endpoint accepts connections at /ws
      - Invalid JWT connections are rejected
      - Connected clients receive broadcast events
      - Disconnections clean up connection pool

