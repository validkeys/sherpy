milestone: m4
name: "People & Resource Services"
generated: "2026-04-20T12:00:00Z"
dependencies: [m3]

style_anchor_refs:
  - SA-001
  - SA-002
  - SA-003
  - SA-004
  - SA-005
  - SA-008
  - SA-009

global_constraints:
  allowed_patterns:
    - "Use Effect.Service with Layer for all service definitions (SA-001)"
    - "Use Model.makeRepository for all entity CRUD operations (SA-002)"
    - "Use SqlResolver for batched, joined, or aggregate queries (SA-003)"
    - "Use HttpApiGroup + HttpApiEndpoint for API definitions (SA-004)"
    - "Use HttpApiBuilder.group for handler implementations (SA-005)"
    - "Use @effect/vitest for tests with it.effect and it.scoped (SA-008)"
    - "Use SqlClient.test for SQL-backed tests with seeded data (SA-009)"
    - "Use Effect.gen for composing async operations — no async/await"
    - "Use Schema.TaggedError for all error types with _tag discriminant"
  forbidden_patterns:
    - "Async/await — use Effect.gen for composition"
    - "Thrown exceptions — use Effect.fail with TaggedErrors"
    - "Raw SQL strings without SqlResolver or repository methods"
    - "Direct database access outside of service layers"
    - "Any types — all function signatures must have explicit input and return types"
    - "N+1 queries — use SqlResolver for joins and aggregates"
    - "Catching and swallowing TaggedErrors — let them propagate"
  tdd_required: true
  max_task_duration_minutes: 120
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-task
    criteria:
      - All dependency tasks marked complete
      - pnpm run build passes for api package
      - SQLite test database accessible
      - Style anchors SA-001, SA-002, SA-003 reviewed
  - stage: pre-commit
    commands:
      - pnpm run lint
      - pnpm run typecheck
      - pnpm test
  - stage: task-completion
    criteria:
      - All tests passing
      - No lint errors
      - No type errors
      - Services use Effect.Service pattern consistently
  - stage: milestone-completion
    criteria:
      - All CRUD services implement create, read, update operations
      - ConflictService detects over-allocation and competing resource windows
      - ResourceAllocationService aggregates by person and project via SQL
      - All RPC endpoints return schema-validated responses
      - Integration tests pass against real SQLite
      - Every public service method has at least one test case

tasks:
  - id: m4-001
    name: "PersonService with CRUD"
    description: |
      Implement the PersonService providing create, list, get, and update operations for the
      `people` table. This is the foundational service for the People & Resource domain,
      used by every subsequent service in this milestone.
    estimate_minutes: 60
    type: feature
    dependencies: []
    files:
      create:
        - "packages/api/src/services/people/PersonService.ts"
        - "packages/api/src/services/people/index.ts"
      modify: []
      touch_only: []
    style_anchor_refs: [SA-001, SA-002]
    instructions:
      objective: |
        Create PersonService as an Effect.Service with a Layer that provides CRUD operations
        (create, list, get, update) for the Person entity against the `people` table.
      style_anchors:
        - ref: SA-001
          guidance: |
            Define PersonService using Effect.Service<PersonService, never, PersonService.Service>.
            Create a PersonServiceLive Layer that uses Model.makeRepository for data access.
            Inject the Person repository as a dependency of the Layer.
        - ref: SA-002
          guidance: |
            Use the Person Model.Class (defined in m1) with Model.makeRepository to get
            a type-safe repository. Use repo.insert, repo.findById, repo.findAll, and repo.update
            for the four CRUD methods. All methods return Effect with appropriate TaggedErrors.
      implementation_steps:
        - "Write failing test for PersonService.create with valid input (TDD — test first, see SA-008)."
        - "Create packages/api/src/services/people/ directory."
        - "Import the Person Model.Class from the models layer (m1)."
        - "Define PersonService tag and interface with methods: create, list, get, update."
        - "Create PersonServiceLive Layer using Effect.gen to construct the repository via Model.makeRepository(Person)."
        - "Implement create(data) — validate input with Schema, call repo.insert, return the created Person."
        - "Implement list(filters?) — call repo.findAll with optional where clauses, return ReadonlyArray<Person>."
        - "Implement get(id) — call repo.findById, yield PersonNotFoundError if not found, return Person."
        - "Implement update(id, data) — verify existence via get, call repo.update with merged fields, return Person."
        - "Define PersonNotFoundError as a TaggedError for not-found cases."
        - "Define PersonValidationError as a TaggedError for schema validation failures."
        - "Export PersonService, PersonServiceLive, PersonNotFoundError, and PersonValidationError from index.ts."
      constraints:
        - "Use Effect.gen for all method bodies — no async/await."
        - "All errors must be TaggedErrors yielded via Effect_yieldError."
        - "Input validation must use Schema.decodeUnknown before database writes."
        - "Never catch and swallow errors — let them propagate."
      success_criteria:
        - "PersonService is defined as Effect.Service with a Layer."
        - "All four CRUD methods are implemented and return typed Effects."
        - "PersonNotFoundError and PersonValidationError are defined as TaggedErrors."
        - "TypeScript compiles without errors."

