  - id: m4-005
    name: "ConflictService — detect over-allocation and competing resource windows"
    description: |
      Implement the ConflictService that detects scheduling conflicts including person
      over-allocation (total allocation > 100% in a period) and competing availability
      windows for the same person.
    estimate_minutes: 120
    type: feature
    dependencies: [m4-003, m4-004]
    files:
      create:
        - "packages/api/src/services/people/ConflictService.ts"
      modify:
        - "packages/api/src/services/people/index.ts"
      touch_only: []
    style_anchor_refs: [SA-001, SA-003]
    instructions:
      objective: |
        Create ConflictService as an Effect.Service with a Layer that detects two types of
        conflicts: (1) over-allocation where a person's total assignment allocation exceeds
        100% for overlapping task periods, and (2) availability window conflicts where a
        person has overlapping or contradictory availability windows.
      style_anchors:
        - ref: SA-001
          guidance: |
            Define ConflictService using Effect.Service with a Layer.
            The Layer depends on AssignmentService and AvailabilityService (not repositories directly).
        - ref: SA-003
          guidance: |
            Use SqlResolver for aggregate queries — sum allocations by person within date ranges,
            and detect overlapping windows. Do NOT load all data into memory and filter in TypeScript.
      implementation_steps:
        - "Define a Conflict schema with fields: type (over_allocation | availability_conflict), personId, details (array of conflicting items)."
        - "Define ConflictService tag and interface with methods: detectOverAllocation(personId, startDate, endDate), detectAvailabilityConflicts(personId), detectAllConflictsForPerson(personId, startDate, endDate)."
        - "Create ConflictServiceLive Layer depending on AssignmentService and AvailabilityService."
        - "Implement detectOverAllocation — use SqlResolver to SUM allocation percentages for the person's assignments that overlap the given date range. If total > 100, return conflicts with details of each contributing assignment."
        - "Implement detectAvailabilityConflicts — query all availability windows for the person, use SqlResolver to find pairs of windows with overlapping date ranges. Return each overlapping pair as a conflict."
        - "Implement detectAllConflictsForPerson — combine results from both detection methods."
        - "Return ReadonlyArray<Conflict> from all methods — empty array means no conflicts."
        - "Export ConflictService, ConflictServiceLive, Conflict schema from index.ts."
      constraints:
        - "Over-allocation detection MUST use SQL aggregation (SUM), not load all assignments and sum in TypeScript."
        - "Availability conflict detection MUST use SQL overlap comparison, not in-memory filtering."
        - "All methods use Effect.gen."
        - "No errors thrown for conflicts — conflicts are data returned in the result array."
        - "Services are injected as Layer dependencies, not imported directly."
      success_criteria:
        - "ConflictService detects over-allocation via SQL aggregation."
        - "ConflictService detects availability window overlaps via SQL range comparison."
        - "detectAllConflictsForPerson combines both detection strategies."
        - "Conflict schema is properly typed."
        - "TypeScript compiles without errors."

