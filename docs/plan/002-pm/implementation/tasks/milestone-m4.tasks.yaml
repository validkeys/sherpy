      implementation_steps:
        - "Define PersonAllocation schema: { personId, personName, totalAllocation, assignments: ReadonlyArray<{ taskId, projectId, allocation }> }."
        - "Define ProjectAllocation schema: { projectId, projectName, totalAllocation, people: ReadonlyArray<{ personId, personName, allocation }> }."
        - "Define ResourceAllocationService tag and interface with methods: allocationByPerson, allocationByProject, personAllocationByProject(personId)."
        - "Create ResourceAllocationServiceLive Layer using Model.makeRepository(Assignment) for dependency."
        - "Implement allocationByPerson — use SqlResolver to query assignments grouped by personId with SUM(allocation), joined with people for names. Map results to PersonAllocation."
        - "Implement allocationByProject — use SqlResolver to query assignments grouped by projectId with SUM(allocation), joined with projects for names and people for person details. Map to ProjectAllocation."
        - "Implement personAllocationByProject — use SqlResolver to query assignments for a specific person grouped by projectId with SUM(allocation). Map to allocation breakdown."
        - "Export ResourceAllocationService, ResourceAllocationServiceLive, and schema types from index.ts."
      constraints:
        - "All aggregation MUST happen in SQL via SqlResolver — no in-memory grouping or summing."
        - "All methods use Effect.gen."
        - "Schemas must have explicit typed definitions, not ad-hoc object shapes."
      success_criteria:
