      Define HttpApiGroups for people, skills, assignments, availability, conflicts, and
      resource allocation, then implement handlers that delegate to the service layers.
    estimate_minutes: 120
    type: feature
    dependencies: [m4-001, m4-002, m4-003, m4-004, m4-005, m4-006]
    files:
      create:
        - "packages/api/src/api/routes/peopleApi.ts"
        - "packages/api/src/api/routes/skillsApi.ts"
        - "packages/api/src/api/routes/assignmentsApi.ts"
        - "packages/api/src/api/routes/availabilityApi.ts"
        - "packages/api/src/api/routes/conflictsApi.ts"
        - "packages/api/src/api/routes/resourceAllocationApi.ts"
      modify:
        - "packages/api/src/api/routes/index.ts"
      touch_only: []
    style_anchor_refs: [SA-004, SA-005]
    instructions:
      objective: |
        Define HttpApiGroups and HttpApiEndpoints for people, skills, assignments, availability,
        conflicts, and resource allocation. Implement handlers using HttpApiBuilder.handlers
        that delegate to the corresponding services.
      style_anchors:
        - ref: SA-004
          guidance: |
            Define each API group using HttpApiGroup with a tag (e.g., "People", "Skills").
            Define endpoints using HttpApiEndpoint with method, path, request schema, and
            response schema. Use Schema.Struct for request/response types. Group related
            endpoints together.
        - ref: SA-005
          guidance: |
            Implement handlers using HttpApiBuilder.handlers for each group. Each handler
            calls the corresponding service method and returns the result. Use Effect.gen
            in handlers. Provide the handler Layer with all required service Layers.
      implementation_steps:
        - "Create peopleApi.ts — define PeopleApi HttpApiGroup with endpoints: POST /people (create), GET /people (list), GET /people/:id (get), PUT /people/:id (update)."
        - "Create skillsApi.ts — define SkillsApi HttpApiGroup with endpoints: POST /skills (create), GET /skills (list), GET /skills/:id (get), PUT /skills/:id (update), DELETE /skills/:id (remove)."
        - "Add person-skill endpoints to skillsApi or a separate PersonSkillsApi: POST /people/:personId/skills (addSkill), DELETE /people/:personId/skills/:skillId (removeSkill), GET /people/:personId/skills (listSkillsForPerson)."
        - "Create assignmentsApi.ts — define AssignmentsApi with endpoints: POST /assignments (assign), DELETE /assignments/:id (unassign), PATCH /assignments/:id (updateAllocation), GET /people/:personId/assignments (listByPerson), GET /tasks/:taskId/assignments (listByTask), GET /projects/:projectId/assignments (listByProject)."
        - "Create availabilityApi.ts — define AvailabilityApi with endpoints: POST /people/:personId/availability (create), PATCH /availability/:id (update), DELETE /availability/:id (remove), GET /people/:personId/availability (listByPerson), GET /people/:personId/availability/overlapping (listOverlapping with query params)."
        - "Create conflictsApi.ts — define ConflictsApi with endpoints: GET /people/:personId/conflicts (detectAllConflictsForPerson with query params for date range)."
        - "Create resourceAllocationApi.ts — define ResourceAllocationApi with endpoints: GET /allocations/by-person (allocationByPerson), GET /allocations/by-project (allocationByProject), GET /people/:personId/allocations/by-project (personAllocationByProject)."
        - "Implement handlers for each group using HttpApiBuilder.handlers, delegating to the corresponding service."
        - "Wire all handler Layers into the route index.ts."
      constraints:
        - "All request and response bodies must use Schema — no any or unknown."
        - "Error responses must map TaggedErrors to appropriate HTTP status codes (404 for not found, 400 for validation, 409 for conflict/already exists)."
        - "Handlers must use Effect.gen — no async/await."
        - "Each API group must be a separate file for maintainability."
        - "RESTful URL patterns: resources are nouns, actions are HTTP methods."
      success_criteria:
        - "All six API groups are defined with complete endpoint sets."
        - "All handlers delegate to service methods."
        - "Request/response schemas are fully typed."
        - "TaggedErrors map to correct HTTP status codes."
        - "All handler Layers are exported from the routes index."
        - "TypeScript compiles without errors."

