      1. Create `packages/api/src/services/project-service.ts`:
         - Define ProjectService using Effect.Service pattern (**SA-001**)
         - Create Layer using SqlClient + repository dependencies
         - Build Project repository using Model.makeRepository from Project model (**SA-002**)
         - Implement methods:
           - create(input: CreateProjectInput): Effect<Project, NotFoundError | ValidationError>
           - list(filters: ProjectFilters): Effect<ReadonlyArray<Project>>
           - get(id: string): Effect<Project, NotFoundError>
           - getBySlug(slug: string): Effect<Project, NotFoundError>
           - update(id: string, input: UpdateProjectInput): Effect<Project, NotFoundError | ValidationError>
