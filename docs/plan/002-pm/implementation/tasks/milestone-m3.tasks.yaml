      **Objective:**
      Implement the MilestoneService with full CRUD and ordering.

      **TDD Approach:** Write failing test for MilestoneService.create before
      implementing. Test the reorder atomic operation before implementing
      sql.withTransaction logic.

      **Style Anchors:**
      1. Create `packages/api/src/services/milestone-service.ts`:
         - Define MilestoneService using Effect.Service pattern (**SA-001**)
         - Create Layer with SqlClient dependency
         - Build Milestone repository using Model.makeRepository (**SA-002**)
         - Implement methods:
           - create(input): Effect<Milestone, NotFoundError | ValidationError>
             - Validate projectId exists (query projects table)
             - Set orderIndex to max+1 within project if not provided
           - listByProject(projectId): Effect<ReadonlyArray<Milestone>>
             - ORDER BY order_index ASC
           - get(id): Effect<Milestone, NotFoundError>
           - update(id, input): Effect<Milestone, NotFoundError | ValidationError>
             - Support status changes (pending → in-progress → complete, etc.)
             - Support acceptanceCriteria updates
           - reorder(projectId, milestoneIds): Effect<ReadonlyArray<Milestone>>
             - Accept ordered array of milestone IDs
             - Update orderIndex for each to match array position
             - Validate all IDs belong to the specified project
      2. Update services/index.ts barrel export

