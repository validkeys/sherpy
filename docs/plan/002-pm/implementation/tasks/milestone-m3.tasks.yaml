         - Define HttpApiGroup.make("projects") with endpoints (**SA-004**):
           - POST /api/projects — createProject
             - Request: CreateProjectRequest schema (name, description, priority, tags)
             - Response: CreateProjectResponse schema
             - Handler: delegate to ProjectService.create, return result
