  - id: m3-007
    name: "Implement DocumentService for generating views from DB"
    description: |
      Create the DocumentService that generates document views (YAML, markdown,
      JSON) from database data. Documents are NOT stored in the DB as source —
      they are generated views assembled from project, milestone, task, and tag
      data. The service also persists generated documents for version history.
    estimate_minutes: 120
    type: code
    dependencies: [m3-003, m3-004]
    files:
      create:
        - packages/api/src/services/document-service.ts
      modify:
        - packages/api/src/services/index.ts
    style_anchor_refs:
      - SA-001
      - SA-003
    instructions: |
      **Objective:**
      Implement DocumentService that generates views from DB data in multiple formats.

      **TDD Approach:** Write failing test for generateProjectPlan('yaml') before
      implementing. Test that generated content reflects current DB state by
      modifying data and regenerating.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-001.md` — Effect.Service with Layer DI
      - See `artifacts/style-anchors/SA-003.md` — SqlResolver for custom queries

      **Implementation Steps:**
      1. Create `packages/api/src/services/document-service.ts`:
         - Define DocumentService using Effect.Service pattern (**SA-001**)
         - Build Document repository using Model.makeRepository for persistence
         - Inject ProjectService, MilestoneService, TaskService as dependencies
         - Implement generation methods:
           - generateProjectPlan(projectId, format: "yaml" | "markdown" | "json"):
             Effect<Document, NotFoundError>
             - Fetch project, milestones (ordered), tasks per milestone, tags
             - Assemble data into structured format
             - Render to requested format:
               - yaml: Serialize to YAML string (use js-yaml or similar)
               - markdown: Render as structured markdown with headers, tables
               - json: JSON.stringify with pretty printing
             - Persist generated document to documents table
             - Increment version (or set to 1 for first generation)
           - getDocument(projectId, documentType): Effect<Document, NotFoundError>
             - Fetch latest version of a document
           - listDocuments(projectId): Effect<ReadonlyArray<Document>>
             - List all documents for a project, latest first
           - getDocumentVersion(projectId, documentType, version): Effect<Document, NotFoundError>
             - Fetch specific version of a document
         - Use SqlResolver for document version queries (**SA-003**):
           - Find latest version: ORDER BY version DESC LIMIT 1
           - Batch document fetches by projectId
      2. Update services/index.ts barrel export

      **Constraints:**
      - ONLY use: Effect.Service + Layer (**SA-001**)
      - ONLY use: Effect.gen — no async/await
      - Documents are GENERATED VIEWS — DB is the source of truth
      - Document content is assembled fresh from current DB state on each generate
      - Persisted documents are for version history, not source data
      - Format rendering must produce valid output for each type
      - ALL errors use TaggedErrors

      **Success Criteria:**
      - DocumentService exports Effect.Service with typed methods
      - generateProjectPlan produces valid YAML, markdown, and JSON
      - Documents persisted with auto-incrementing version numbers
      - Document content reflects current DB state at generation time
      - getDocument returns latest version by default

