      2. Update `packages/api/src/services/index.ts`:
         - Export ProjectService and ProjectServiceLive layer
         - Ensure barrel export is clean

      **Constraints:**
      - ONLY use: Effect.Service + Layer for service definition (**SA-001**)
      - ONLY use: Model.makeRepository for basic CRUD (**SA-002**)
      - ONLY use: SqlResolver for filtered list queries (**SA-003**)
      - ONLY use: Effect.gen for composing operations — no async/await
      - ALL errors must be TaggedErrors (NotFoundError, ValidationError)
      - NEVER throw exceptions — use Effect.fail

      **Success Criteria:**
      - ProjectService exports Effect.Service with typed methods
      - Layer provides service via Effect.provide
      - list() supports filtering by status, priority, and search
      - slug generation normalizes project names
      - All methods return typed Effects with proper error channels

