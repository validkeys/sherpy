    instructions: |
      **Objective:**
      Integration tests for all services working together against real SQLite.

      **Style Anchors:**
      - See `artifacts/style-anchors/SA-008.md` — @effect/vitest patterns
      - See `artifacts/style-anchors/SA-009.md` — SQL testing with temp databases

      **Implementation Steps:**
      1. Create `packages/api/test/integration/service-integration.test.ts`:
         - Set up temp SQLite + full Layer stack (**SA-009**)
         - Provide all service layers together
         - Test cross-service interactions:
           - Create project → create milestone → create tasks → verify ordering
           - Create tags → assign to project → get project tags → verify
           - Create project with tags → update tag → verify project reflects change
           - Create milestone → reorder → verify order persisted
           - Create tasks → bulk status update → verify all updated
           - Create project → create chat session → add messages → retrieve history
           - Delete tag → verify removed from all projects
           - Delete project → verify cascading deletes (milestones, tasks, sessions)
         - Test error scenarios:
           - Create milestone with non-existent project → NotFoundError
           - Create task with non-existent milestone → NotFoundError
           - Create duplicate tag name → ConflictError
           - Update non-existent project → NotFoundError
      2. Create `packages/api/test/integration/document-generation.test.ts`:
         - Test document generation in all three formats:
           - Seed project with milestones and tasks
           - Generate YAML document → verify valid YAML structure
           - Generate markdown document → verify markdown format
           - Generate JSON document → verify valid JSON structure
         - Test version history:
           - Generate document → version 1
           - Modify project data → generate again → version 2
           - Retrieve version 1 → verify original content
           - Retrieve version 2 → verify updated content
         - Test document listing:
           - Generate multiple document types for same project
           - List documents → verify all types present

      **Constraints:**
      - ONLY use: @effect/vitest with it.effect and it.scoped (**SA-008**)
      - ONLY use: real SQLite temp databases (**SA-009**)
      - Provide full Layer stack (all services + SqlClient + migrations)
      - Each test suite uses isolated temp database
      - Clean up resources after each test

      **Success Criteria:**
      - All integration tests pass
      - Cross-service interactions verified
      - Document generation produces valid YAML, markdown, JSON
      - Version history correctly tracked
      - Cascading deletes verified
      - No test state leaks between suites

