      - pnpm run typecheck
      - pnpm test
  - stage: task-completion
    criteria:
      - All tests passing
      - No lint or type errors
      - Services use Effect.Service pattern consistently
      - All errors use TaggedError pattern
  - stage: milestone-completion
    criteria:
