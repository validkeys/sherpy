global_constraints:
  allowed_patterns:
    - "Use Effect.Service with Layer for all domain services (SA-001)"
    - "Use Model.Class with makeRepository for database entity access (SA-002)"
    - "Use SqlResolver for batched and custom query patterns (SA-003)"
    - "Use @effect/sql SqlClient for all database operations (SA-002)"
    - "Use Effect.gen for composing async operations in services (SA-001)"
    - "Use Schema.TaggedError for all service error types"
    - "Use HttpApiGroup + HttpApiEndpoint for RPC endpoint definitions (SA-004)"
    - "Use HttpApiBuilder.group for handler implementations (SA-005)"
  forbidden_patterns:
    - "Async/await — use Effect.gen for composition"
    - "Throwing exceptions — use Effect.fail with TaggedErrors"
    - "Raw SQL strings without SqlResolver or repository methods"
    - "Direct database access outside of service layers"
    - "Business logic in HTTP handlers — delegate to services"
    - "Type assertions (as) on external data — use Schema.decodeUnknown"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-task
