      - "@effect/platform-node — Node.js runtime for Effect platform"
      - "@effect/sql — unified SQL client interface"
      - "@effect/sql-libsql — SQLite driver for local mode"
      - "@effect/sql-pg — PostgreSQL driver for cloud mode"
      - "@effect/schema — request/response validation, type generation"
      - "@effect/vitest — Effect-native Vitest helpers"
      - "tailwindcss — utility-first CSS"
      - "assistant-ui — React AI chat interface components"
      - "shadcn/ui — accessible React component library"
      - "ai — Vercel AI SDK core"
      - "@ai-sdk/amazon-bedrock — Bedrock provider for Vercel AI SDK"
    development:
      - "typescript — strict mode"
      - "vitest — test runner"
      - "biome — linter + formatter"
