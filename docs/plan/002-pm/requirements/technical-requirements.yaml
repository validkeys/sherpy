overview: |
  Sherpy PM is a local-first project management system with AI-assisted scheduling.
  It runs as a global Node.js CLI that spawns an Effect-TS API daemon serving a React
  web UI. The system is built cloud-ready from day one — using @effect/sql for
  database abstraction (SQLite locally, PostgreSQL in cloud), Okta OIDC for auth
  that works in both modes, and stateless API design for horizontal scaling.

  The architecture is a pnpm monorepo with three main packages (cli, api, web) plus
  a shared types package. Effect-TS layered services provide domain logic with clean
  dependency injection. The frontend is built with Vite and served as static assets
  by the API daemon.

  **UI Paradigm:** Email inbox layout. Projects enter as new intake, users tag/assign/filter
  them. Clicking a project shows its current status (initially tracking Sherpy flow
  pipeline position, then manual status during active development). Per-project
  assistant-ui chat drives the Sherpy flow steps or answers questions about project
  documents. Documents are viewable with syntax highlighting and exportable as PDF.

  **Data Paradigm:** Database is the sole source of truth. No .sherpy/ files are created
  or parsed. The Sherpy flow chat steps write directly to the DB. Documents are
  generated views — an adapter renders DB data into standard Sherpy document formats
  (YAML, markdown, PDF) on demand. Net new project with no existing file-based
  projects to migrate.

architecture:
  pattern: Effect-TS Layered Services
  description: |
    The system follows a layered architecture built on Effect-TS primitives (Layer,
    Service, Effect). Domain services encapsulate business logic and are composed
    via Effect's dependency injection layer system.

    **Architecture Components:**

    1. **CLI Layer** (packages/cli)
       - Global Node.js CLI (`sherpy start` / `sherpy stop`)
       - Spawns API daemon as detached child process
       - Tracks PID for lifecycle management
       - Opens browser to web UI on start

    2. **API Layer** (packages/api)
       - Effect-TS HTTP server via @effect/platform-node
       - RPC-style POST endpoints for all operations
       - WebSocket endpoint for real-time dashboard updates
       - Okta OIDC JWT validation on every request
       - Serves React static assets
       - Auto-runs database migrations on startup

    3. **Shared Types** (packages/shared)
       - Effect Schema definitions for all API request/response types
       - Shared domain types between CLI, API, and web packages
       - Event types for WebSocket messages

    4. **Web Layer** (packages/web)
       - Email inbox layout with project list, tagging, filtering
       - Project detail view showing status and documents
       - Per-project assistant-ui chat for Sherpy flow and Q&A
       - Document viewer with syntax highlighting
       - PDF export for generated documents
       - Built by Vite as static assets
       - WebSocket client for real-time updates
       - Okta OIDC login flow

    5. **Data Layer** (@effect/sql)
       - Database is the sole source of truth
       - No .sherpy/ files — all data lives in DB
       - Unified SqlClient interface
       - Local mode: @effect/sql-libsql → ~/.sherpy/sherpy.db
       - Cloud mode: @effect/sql-pg → RDS PostgreSQL
       - Swap via Effect Layers driven by config/env
       - Document adapter generates YAML/markdown/PDF views from DB data

    6. **AI Layer** (packages/api internal)
       - AWS Bedrock via Vercel AI SDK (@ai-sdk/amazon-bedrock)
       - Structured output generation via Vercel AI SDK
       - All AI interactions through single service
       - Conversational UX via assistant-ui per-project
       - Drives Sherpy flow steps through chat

  components:
    - name: CLI
      responsibility: Daemon lifecycle management (spawn, track, stop)
    - name: API Daemon
      responsibility: HTTP/WS server, RPC endpoints, auth, static asset serving, document generation
    - name: Web UI (Inbox)
      responsibility: Project inbox, tagging, filtering, status tracking, document viewer, PDF export
    - name: Web UI (Chat)
      responsibility: Per-project assistant-ui chat for Sherpy flow steps and project Q&A
    - name: Data Layer
      responsibility: Database-agnostic persistence via @effect/sql, document adapter
    - name: AI Service
      responsibility: Bedrock integration, Sherpy flow orchestration, schedule generation, scenario analysis
    - name: Shared Types
      responsibility: Effect Schema definitions, shared domain types, WS event types

technology_stack:
  language: TypeScript
  runtime: Node.js 23+ with ESM
  frameworks:
