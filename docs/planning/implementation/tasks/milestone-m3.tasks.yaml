  - id: m3-004
    name: "Create file tree state atoms with jotai"
    description: |
      Define jotai atoms for file tree UI state including expanded folders, selected file,
      and tree structure. Atoms will be consumed by tree view components.
    estimate_minutes: 45
    type: code
    dependencies: [m3-001]
    files:
      create:
        - packages/web/src/features/files/state/file-tree-atoms.ts
      touch_only:
        - packages/web/src/features/files/types/index.ts
    style_anchor_refs:
      - jotai-feature-state
    instructions: |
      **Objective:**
      Create jotai atoms for managing file tree UI state (expanded folders, selected file).

      **Implementation Steps:**
      1. Create `file-tree-atoms.ts` with atoms:
         - `expandedFoldersAtom`: Set<string> of folder IDs that are expanded
         - `selectedFileAtom`: string | null for selected file ID
         - `fileTreeAtom`: derived atom that transforms Document[] into FileTreeNode[]
      2. Create helper functions:
         - `buildFileTree(documents: Document[]): FileTreeNode[]` - transforms flat list to tree
         - Organize documents into folders: requirements/, implementation/, delivery/, architecture/, artifacts/, summaries/
      3. Use primitive atoms for expanded/selected state
      4. Use derived atom for fileTreeAtom that depends on documents data
      5. Export atoms and helpers from feature index.ts

      **Constraints:**
      - ONLY use: jotai atoms (atom, atomWithDefault), no external state
      - Follow pattern in **jotai-feature-state** for atom organization
      - NEVER use: React Context, Redux, or component state for tree state
      - Keep atoms pure (no side effects in atom definitions)

      **Testing Requirements:**
      - Unit tests in task m3-005

      **Success Criteria:**
      - Three atoms defined (expandedFolders, selectedFile, fileTree)
      - buildFileTree helper function implemented
      - Tree structure groups documents into correct folders
      - Atoms can be imported and used with useAtom hook
      - TypeScript types correct for all atoms

