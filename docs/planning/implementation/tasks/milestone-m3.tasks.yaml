  - id: m3-002
    name: "Implement Documents API layer with react-query"
    description: |
      Create three-part API pattern (fetcher + queryOptions + hook) for fetching
      documents from backend API. Supports getting all documents for a project and
      getting specific document by type.
    estimate_minutes: 60
    type: code
    dependencies: [m3-001]
    files:
      create:
        - packages/web/src/features/files/api/get-documents.ts
        - packages/web/src/features/files/api/get-document.ts
      touch_only:
        - packages/web/src/features/files/types/index.ts
        - packages/web/src/lib/api-client.ts
    style_anchor_refs:
      - react-query-api-layer
    instructions: |
      **Objective:**
      Implement react-query API layer for fetching documents following three-part pattern.

      **Implementation Steps:**
      1. Create `get-documents.ts`:
         - Fetcher: `getDocuments({ projectId }): Promise<Document[]>`
         - QueryOptions: `getDocumentsQueryOptions(projectId: string)`
         - Hook: `useDocuments({ projectId, queryConfig? })`
         - Query key: `['projects', projectId, 'documents']`
      2. Create `get-document.ts`:
         - Fetcher: `getDocument({ projectId, documentType }): Promise<Document>`
         - QueryOptions: `getDocumentQueryOptions(projectId, documentType)`
         - Hook: `useDocument({ projectId, documentType, queryConfig? })`
         - Query key: `['projects', projectId, 'documents', documentType]`
      3. Use api-client from `@/lib/api-client` for fetch calls
      4. API endpoints:
         - GET `/api/projects/:projectId/documents`
         - GET `/api/projects/:projectId/documents/:documentType`
      5. Export all functions from feature's index.ts

      **Constraints:**
      - ONLY use: Three-part pattern from **react-query-api-layer**
      - Follow exact naming convention (get prefix, queryOptions suffix)
      - NEVER use: Direct fetch in components, inconsistent query keys
      - Include full TypeScript types for all parameters and return values

      **Testing Requirements:**
      - Unit tests for fetcher functions (mock api-client)
      - Tests in task m3-003

      **Success Criteria:**
      - Both API files created with three-part pattern
      - Fetchers, queryOptions, and hooks exported
      - TypeScript inference working (no any types)
      - Query keys follow consistent pattern
      - Can import and use hooks from feature index

