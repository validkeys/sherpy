      **Constraints:**
      - ONLY use: Vitest, @testing-library/react, vi.mock for mocking
      - Follow test patterns from **react-query-api-layer** anchor
      - NEVER use: Real API calls, sleep/wait without waitFor
      - Use createWrapper for QueryClientProvider in hook tests

      **Testing Requirements:**
      - Test both fetcher and hook for each API file
