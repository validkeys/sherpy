    instructions: |
      **Objective:**
      Create main FileTree component that orchestrates document fetching and tree rendering.

      **Implementation Steps:**
      1. Create `file-tree.tsx` component
      2. Accept props: projectId (string)
      3. Use useDocuments hook to fetch documents for project
      4. Use useAtom to read fileTreeAtom (pass documents to buildFileTree)
      5. Show loading state (shadcn Skeleton) while fetching
      6. Show error state if fetch fails
      7. Recursively render tree nodes:
         - For folders: render FileTreeFolder component
         - For files: render FileTreeItem component
         - Pass depth prop for indentation
      8. Wrap tree in shadcn ScrollArea for scrolling
      9. Export from feature index.ts

      **Constraints:**
      - ONLY use: react-query hooks, jotai atoms, shadcn components
      - Follow **react-query-api-layer** for data fetching
      - Use **jotai-feature-state** for tree structure
      - NEVER use: Direct API calls, component state for documents
      - Handle loading and error states gracefully

      **Testing Requirements:**
