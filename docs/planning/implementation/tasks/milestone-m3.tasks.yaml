      **Implementation Steps:**
      1. Create `get-documents.test.ts`:
         - Mock api-client with vi.mock
         - Test getDocuments fetcher calls correct endpoint
         - Test useDocuments hook with renderHook and createWrapper
         - Test loading, success, and error states
      2. Create `get-document.test.ts`:
         - Mock api-client
         - Test getDocument fetcher with projectId and documentType
         - Test useDocument hook behavior
         - Test 404 error handling (document not found)
      3. Use @testing-library/react renderHook for hook tests
