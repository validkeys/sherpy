  - id: m4-014
    name: "Integrate Projects API with Sidebar workflow state"
    description: |
      Connect sidebar step navigation to Projects API by updating pipelineStatus when
      user navigates between workflow steps. Enables state persistence across sessions.
    estimate_minutes: 90
    type: code
    dependencies: [m4-006, m4-005]
    files:
      modify:
        - packages/web/src/features/sidebar/components/sidebar.tsx
        - packages/web/src/features/sidebar/state/sidebar-atoms.ts
      touch_only:
        - packages/web/src/shared/api/projects/update-project.ts
        - packages/web/src/shared/api/projects/get-project.ts
    style_anchor_refs:
      - react-query-mutations
    instructions: |
      **Objective:**
      Persist workflow step navigation to database via pipelineStatus field updates.

      **Implementation Steps:**
      1. Update sidebar components to use Projects API:
         - Import useUpdateProject from shared/api/projects/update-project
         - Import currentProjectIdAtom from app-level state
         - When user clicks workflow step, call updateProject.mutate with new pipelineStatus
         - Update local jotai atom immediately (optimistic UI)
         - On mutation success, no additional action needed (cache updated automatically)
         - On mutation error, revert local atom and show error notification
      2. Load initial workflow state from project on mount:
