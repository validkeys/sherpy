      - [ ] User-facing error notifications implemented
      - [ ] Loading states on all async operations
      - [ ] 404 errors handled appropriately
      - [ ] Network errors handled with retry logic

      **Cache Management:**
      - [ ] All mutations invalidate related queries
      - [ ] Query keys include all filter parameters
      - [ ] Stale time configured appropriately
      - [ ] No manual cache manipulation (use invalidateQueries)

      **Testing:**
      - [ ] All API hooks have integration tests
      - [ ] Error paths covered in tests
      - [ ] Cache invalidation verified in tests
      - [ ] Test coverage >80% for shared/api/

      **Documentation:**
      - [ ] JSDoc comments on all exported functions
      - [ ] README.md updated with API integration overview
      - [ ] shared/api/README.md created with structure explanation
      - [ ] Example usage documented for complex patterns

      **Implementation Steps:**
