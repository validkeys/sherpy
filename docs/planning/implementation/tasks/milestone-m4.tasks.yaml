      Final quality review of all M4 code ensuring patterns, error handling, and documentation meet standards.

      **Review Checklist:**

      **Pattern Adherence:**
      - [ ] All GET endpoints follow three-part pattern (fetcher + queryOptions + hook)
      - [ ] All mutations follow pattern (schema + fetcher + hook with cache invalidation)
      - [ ] All API files organized under shared/api/ with proper structure
      - [ ] No cross-feature imports for API calls
      - [ ] Query keys properly structured with parameters
      - [ ] All mutations invalidate appropriate caches

      **Type Safety:**
