global_constraints:
  allowed_patterns:
    - "Use react-query three-part pattern (fetcher + queryOptions + hook) for all GET endpoints"
    - "Use react-query mutation pattern with Zod validation for all POST/PATCH/DELETE operations"
    - "Follow feature-module-structure for shared/api/ organization"
    - "Use queryClient.invalidateQueries() for cache management after mutations"
    - "Store server state in react-query cache, client state in jotai atoms"
    - "API client should use existing lib/api-client.ts with authentication"
  forbidden_patterns:
    - "Direct fetch/axios calls without react-query wrapper"
    - "Manual cache updates (use invalidateQueries instead)"
    - "Storing server data in jotai atoms (belongs in react-query)"
    - "Skipping Zod validation on mutation inputs"
    - "Cross-feature imports for API calls"
    - "Hardcoded API URLs (use environment variables)"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

