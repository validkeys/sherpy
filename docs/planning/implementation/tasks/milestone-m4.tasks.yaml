tasks:
  - id: m4-001
    name: "Setup API client and React Query configuration"
    description: |
      Configure React Query client with proper defaults, create or verify API client
      wrapper with authentication, and set up query/mutation configuration types for
      consistent usage across all API calls.
    estimate_minutes: 60
    type: config
    dependencies: []
    files:
      create:
        - packages/web/src/lib/react-query.ts
      modify:
        - packages/web/src/lib/api-client.ts
        - packages/web/src/app/provider.tsx
      touch_only:
        - packages/web/src/lib/query-client.ts
    instructions: |
      **Objective:**
      Set up React Query infrastructure with proper configuration and API client wrapper.

      **Implementation Steps:**
      1. Verify or create `lib/api-client.ts` with:
         - Base fetch wrapper using VITE_API_URL environment variable
         - Automatic authentication header injection (JWT from token store)
         - Error response handling with typed errors
         - Request/response interceptors for logging in dev mode
      2. Create `lib/react-query.ts` with:
         - QueryConfig type helper: `type QueryConfig<T> = Omit<ReturnType<T>, 'queryKey' | 'queryFn'>`
         - MutationConfig type helper: `type MutationConfig<T> = Omit<UseMutationOptions<...>, 'mutationFn'>`
         - Export both types for use in API files
      3. Verify `lib/query-client.ts` has proper defaults:
         - queries.refetchOnWindowFocus: false
         - queries.retry: 1
         - queries.staleTime: 5 minutes
      4. Update `app/provider.tsx` to wrap app with QueryClientProvider if not already present

      **Constraints:**
      - ONLY use: fetch API, React Query QueryClientProvider
      - Use VITE_API_URL from environment variables (not hardcoded)
      - Follow fetch wrapper pattern from bulletproof-react
      - NEVER use: axios or other HTTP libraries (keep it simple with fetch)

      **Testing Requirements:**
      - Unit tests for api-client error handling
      - Test authentication header injection
      - Test error response parsing

      **Success Criteria:**
      - API client properly injects auth headers
      - React Query provider wraps application
      - QueryConfig and MutationConfig types exported
      - Environment variable VITE_API_URL used for base URL
      - No type errors in lib/ files

