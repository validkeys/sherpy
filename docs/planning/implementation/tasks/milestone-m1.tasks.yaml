      - All types exported
      - Tests passing with >90% coverage

  - id: m1-003
    name: "Create workflow state atoms with jotai"
    description: |
      Implement jotai atoms for managing workflow step state. Includes current step,
      step statuses, and navigation logic. Core state management for sidebar.
    estimate_minutes: 60
    type: code
    dependencies: [m1-002]
    files:
      create:
        - packages/web/src/features/sidebar/state/workflow-atoms.ts
      touch_only:
        - packages/web/src/features/sidebar/types.ts
    style_anchor_refs:
      - jotai-feature-state
    instructions: |
      **Objective:**
      Create jotai atoms for workflow state management following jotai-feature-state pattern.

      **Implementation Steps:**
      1. Create `packages/web/src/features/sidebar/state/workflow-atoms.ts`
      2. Import atom, atomWithStorage from jotai
      3. Define currentStepAtom using atomWithStorage:
         - Key: 'sherpy:workflow:currentStep'
         - Default: 'intake' (first step)
         - Type: WorkflowStep
      4. Define completedStepsAtom using atomWithStorage:
         - Key: 'sherpy:workflow:completedSteps'
         - Default: [] (empty array)
         - Type: WorkflowStep[]
      5. Create derived stepStatusesAtom (read-only):
         - Maps each step to 'complete' | 'current' | 'pending'
         - Based on completedStepsAtom and currentStepAtom
      6. Create nextStepAtom (read/write):
         - Read: returns next step after current
         - Write: advances to next step and updates current
      7. Create prevStepAtom (read/write):
         - Read: returns previous step
         - Write: goes back to previous step
      8. Add markStepCompleteAtom (write-only):
         - Adds step to completedStepsAtom

      **Constraints:**
      - ONLY use: jotai atoms (atom, atomWithStorage), no react-query
      - Follow pattern in **jotai-feature-state** for atom structure
      - Use atomWithStorage for persistence across page reloads
      - NEVER use: React context, Redux, or other state libraries
      - Name all atoms with Atom suffix
      - Export all atoms directly (not wrapped in functions)

      **Testing Requirements:**
      - Unit tests for each atom's behavior
      - Test derived atom logic (stepStatusesAtom)
      - Test navigation atoms (next/prev)
      - Test localStorage persistence

      **Success Criteria:**
      - All atoms defined with correct types
      - Derived atoms compute correct values
      - Navigation logic works (next/prev)
      - State persists in localStorage
      - Tests passing with >85% coverage

