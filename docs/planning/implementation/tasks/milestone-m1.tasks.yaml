      Create main Sidebar component integrating workflow state with step list UI.

      **Implementation Steps:**
      1. Create `packages/web/src/features/sidebar/components/sidebar.tsx`
      2. Import useAtom, useAtomValue, useSetAtom from jotai
      3. Import workflow atoms (currentStepAtom, stepStatusesAtom)
      4. Import WORKFLOW_STEPS constant and SidebarStep component
      5. Define Sidebar component (no props needed):
         - Read currentStepAtom for current step
         - Read stepStatusesAtom for all step statuses
         - Use setAtom to update currentStepAtom on click
      6. Component structure:
         - Aside element with fixed width (w-1/3), full height, bg color, border
         - Header section: "Workflow Steps" title
