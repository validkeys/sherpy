        - packages/web/src/features/sidebar/types.ts
    instructions: |
      **Objective:**
      Define workflow step types and constants matching sherpy-flow pipeline.

      **Implementation Steps:**
      1. Create `packages/web/src/features/sidebar/types.ts`
      2. Define WorkflowStep type:
         ```typescript
         export type WorkflowStep =
           | 'intake'
           | 'gap-analysis'
           | 'business-requirements'
           | 'technical-requirements'
           | 'style-anchors'
           | 'implementation-planning'
           | 'plan-review'
           | 'architecture-decisions'
           | 'delivery-timeline'
           | 'qa-test-plan';
         ```
      3. Define WorkflowStepConfig interface with id, name, description
      4. Export WORKFLOW_STEPS constant: array of 10 steps with metadata
      5. Define StepStatus type: 'complete' | 'current' | 'pending'
      6. Add helper function getStepIndex(step: WorkflowStep): number

      **Constraints:**
      - ONLY use: TypeScript type definitions, const arrays
      - Match pipeline values from technical-requirements.yaml (pipelineStatus field)
      - NEVER use: Enums (use string literal unions)
      - Export all types and constants

      **Testing Requirements:**
