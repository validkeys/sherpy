    instructions: |
      Implement orchestration logic for updating affected artifacts.

      **Requirements (FR-009):**
      - Walk through affected steps to update artifacts
      - Invoke appropriate skills for each document type
      - Track update progress
      - Handle errors gracefully
      - Present updated artifacts for review

      **Implementation:**
      ```typescript
      export async function orchestrateCascadeUpdate(
        projectId: string,
        affectedArtifacts: AffectedArtifact[],
        onProgress: (update: ProgressUpdate) => void
      ): Promise<CascadeResult> {
        const results: DocumentUpdateResult[] = []

        // Update each artifact in dependency order
        for (const artifact of affectedArtifacts) {
          onProgress({ artifact, status: 'updating' })

          const result = await regenerateDocument(projectId, artifact.documentType)
          results.push(result)

          onProgress({ artifact, status: 'complete', result })
        }

        return { success: true, results }
      }
      ```

      **API Integration:**
      - POST /api/projects/:projectId/cascade-update
      - Use react-query useMutation
      - Include optimistic updates
      - Cache invalidation for updated documents

      **Validation:**
      - Updates process in correct order
      - Progress callback invoked correctly
      - Errors don't halt entire cascade
      - Cache updated after successful mutations

