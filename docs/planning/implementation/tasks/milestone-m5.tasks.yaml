    instructions: |
      Implement error boundaries for graceful error handling.

      **Requirements:**
      - Catch React component errors
      - Display user-friendly error message
      - Log error details to console
      - Provide "Try Again" button
      - Don't crash entire app

      **Implementation:**
      ```typescript
      export class ErrorBoundary extends React.Component<
        { children: React.ReactNode },
        { hasError: boolean; error?: Error }
      > {
        static getDerivedStateFromError(error: Error) {
          return { hasError: true, error }
        }

        componentDidCatch(error: Error, errorInfo: ErrorInfo) {
          console.error('ErrorBoundary caught:', error, errorInfo)
        }

        render() {
          if (this.state.hasError) {
            return <ErrorFallback error={this.state.error} onReset={() => this.setState({ hasError: false })} />
          }
          return this.props.children
        }
      }
      ```

      **Error Fallback UI:**
      - Friendly message: "Something went wrong"
      - Brief error description (not stack trace)
      - "Try Again" button to reset state
      - "Report Issue" link (optional)

      **Validation:**
      - Trigger error in component (throw new Error())
      - Error boundary catches and displays fallback
      - Try Again button resets error state

