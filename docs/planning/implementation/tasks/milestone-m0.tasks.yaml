  - id: m0-011
    name: "Create App Shell with Query and Atom Providers"
    description: |
      Set up the application shell with React Query provider for data fetching
      and Jotai provider for state management. Configure query client with
      proper defaults.
    estimate_minutes: 60
    type: code
    status: completed
    completed_at: "2026-04-29"
    dependencies: [m0-010]
    files:
      create:
        - packages/web/src/providers/app-provider.tsx
      modify:
        - packages/web/src/lib/query-client.ts
        - packages/web/src/main.tsx
    instructions: |
      **Objective:**
      Create application shell with React Query and Jotai providers.

      **Implementation Steps:**
      1. Update lib/query-client.ts:
         - Create QueryClient instance with defaults
         - Set staleTime: 5 minutes
         - Set cacheTime: 10 minutes
         - Set retry: 1
         - Configure error handling
         - Export queryClient singleton
      2. Create providers/app-provider.tsx:
         - Import QueryClientProvider from @tanstack/react-query
         - Import Provider from jotai
         - Create AppProvider component wrapping both providers
         - Add React Query Devtools (development only)
         - Accept children prop
      3. Update main.tsx:
         - Wrap RouterProvider with AppProvider
         - Ensure proper nesting: AppProvider > RouterProvider
      4. Add error boundary at app level:
         - Catch and display errors gracefully
         - Log errors in development
      5. Test providers work:
         - Create test component using useQuery
         - Create test component using atom

      **Constraints:**
      - QueryClient must be singleton (same instance everywhere)
      - Jotai Provider wraps entire app for atom scope
      - React Query Devtools only in development
      - Error boundary catches all errors

      **Testing Requirements:**
      - Test QueryClientProvider provides queryClient
      - Test Jotai Provider provides atom scope
      - Test error boundary catches errors
      - Integration test with both providers

      **Validation Commands:**
      - npm run dev (verify no provider errors)
      - Open React Query Devtools in browser

      **Success Criteria:**
