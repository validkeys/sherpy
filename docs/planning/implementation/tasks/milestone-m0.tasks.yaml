      **Objective:**
      Configure Vitest with React Testing Library for component and integration testing.

      **Implementation Steps:**
      1. Install testing dependencies:
         - `npm install -D vitest @vitest/ui`
         - `npm install -D @testing-library/react @testing-library/jest-dom`
         - `npm install -D @testing-library/user-event`
         - `npm install -D jsdom`
      2. Create vitest.config.ts:
         - Extend vite.config.ts
         - Configure jsdom environment
         - Set up test globals
         - Configure coverage thresholds (>80%)
      3. Create src/test/setup.ts:
         - Import @testing-library/jest-dom
         - Set up global test utilities
         - Configure cleanup between tests
      4. Create src/test/utils.tsx:
         - Custom render function with providers (QueryClient, etc.)
         - Export all from @testing-library/react
         - Add helper utilities
      5. Add npm scripts:
         - "test": "vitest"
         - "test:ui": "vitest --ui"
         - "test:coverage": "vitest --coverage"
      6. Create example test file to verify setup

      **Constraints:**
      - Use Vitest (not Jest) for consistency with Vite
      - Use jsdom for browser environment simulation
      - Set coverage thresholds (80% minimum)
