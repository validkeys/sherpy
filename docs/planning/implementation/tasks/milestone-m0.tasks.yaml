  - id: m0-017
    name: "Backend Validation Spike - Comprehensive"
    description: |
      CRITICAL: Comprehensive validation of backend capabilities before proceeding
      with feature development. Validates API endpoints, WebSocket connection,
      skill invocation mechanism, and database schema assumptions.
    estimate_minutes: 120
    type: spike
    dependencies: [m0-015]
    files:
      create:
        - packages/web/src/spike/backend-validation.ts
        - docs/planning/artifacts/backend-validation-report.md
    instructions: |
      **Objective:**
      Validate ALL critical backend assumptions before M1 feature development begins.

      **Validation Checklist:**

      **1. API Endpoints Availability (30min):**
      - [ ] GET /api/projects - list projects
      - [ ] POST /api/projects - create project
      - [ ] GET /api/projects/:id - get project
      - [ ] PATCH /api/projects/:id - update project
      - [ ] GET /api/projects/:id/documents - list documents
      - [ ] GET /api/projects/:id/documents/:type - get document
      - [ ] POST /api/projects/:id/documents/generate - generate document
      - [ ] GET /api/projects/:id/chat/messages - get messages
      - [ ] POST /api/projects/:id/chat/messages - send message
      - Test each endpoint with curl or Postman
      - Document actual request/response formats
      - Verify authentication mechanism (JWT? API key?)

      **2. Database Schema Validation (20min):**
      - [ ] Verify projects table has pipelineStatus field
      - [ ] Verify pipelineStatus accepts all workflow step values
      - [ ] Verify documents table structure matches expectations
      - [ ] Verify chat_messages table exists
      - [ ] Check for any schema migrations needed
      - Document actual schema vs. assumptions

      **3. WebSocket Connection (30min):**
      - [ ] Test WebSocket endpoint (VITE_WS_URL)
      - [ ] Verify JWT authentication works with WebSocket
      - [ ] Test connection lifecycle (connect, disconnect, reconnect)
      - [ ] Verify message format for streaming
      - [ ] Test error handling (connection drops, auth failures)
      - Document WebSocket protocol details

      **4. Programmatic Skill Invocation (40min):**
      - [ ] Verify skills can be invoked via API (not just CLI)
      - [ ] Test skill invocation endpoint or mechanism
      - [ ] Verify skill completion webhooks/callbacks exist
      - [ ] Test document generation after skill completion
      - [ ] Verify streaming skill responses work
      - Document actual skill invocation flow
      - If skill invocation NOT supported programmatically: FLAG AS BLOCKER

      **Implementation Steps:**
      1. Create spike/backend-validation.ts with test scripts
      2. Run validation tests against actual backend
      3. Document findings in backend-validation-report.md:
         - Section per validation area
         - Green/Yellow/Red status for each check
         - Actual vs. expected results
         - Blockers identified
         - Required changes or workarounds
      4. If blockers found: create follow-up tasks
      5. If all green: proceed to M1 with confidence

      **Success Criteria:**
      - All validation checks completed
      - Report documents findings clearly
      - Any blockers identified and escalated
      - Confidence level for M1 start: High/Medium/Low
      - If LOW: do not proceed to M1 until resolved

      **Blocker Examples:**
      - WebSocket auth not working → M2 at risk
      - Skill invocation not programmatic → Core feature impossible
      - pipelineStatus field missing → M4 at risk
      - Documents API not functional → M3 at risk

