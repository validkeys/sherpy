      **Objective:**
      Define performance budgets and set up monitoring to prevent regressions.

      **Implementation Steps:**
      1. Create performance-budgets.md with sections:
         - **Bundle Size:** Main bundle < 250KB gzipped, chunks < 100KB
         - **React Query Cache:** Max 1000 cache entries, auto-eviction strategy
         - **WebSocket Messages:** Batch size limits, message throttling
         - **File Tree Rendering:** Max 500 nodes before virtualization required
         - **Initial Load Time:** < 2 seconds on 3G
         - **Time to Interactive:** < 3 seconds on 3G
         - **First Contentful Paint:** < 1 second
      2. Create lib/performance-monitor.ts:
         - Cache size monitoring function
         - Bundle size tracking (dev mode)
