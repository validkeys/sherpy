      - Inspect element in browser (verify Tailwind classes)
      - npm run build (verify CSS bundled)

      **Success Criteria:**
      - Tailwind CSS configured and working
      - PostCSS integration complete
      - Design tokens defined in config
      - CSS variables for theming added
      - Styles apply correctly in browser
      - Build includes processed CSS

  - id: m0-005
    name: "Configure ESLint and Prettier"
    description: |
      Set up code quality tools (ESLint) and formatting (Prettier) with
      React 19 and TypeScript best practices. Configure pre-commit hooks
      are optional but linting must work.
    estimate_minutes: 45
    type: config
    status: completed
    completed_at: "2026-04-29"
    dependencies: [m0-003]
    files:
      create:
        - packages/web/.eslintrc.cjs
        - packages/web/.prettierrc
        - packages/web/.prettierignore
      modify:
        - packages/web/package.json
    instructions: |
      **Objective:**
      Configure ESLint and Prettier for consistent code quality and formatting.

      **Implementation Steps:**
      1. Install ESLint dependencies:
         - `npm install -D eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin`
         - `npm install -D eslint-plugin-react eslint-plugin-react-hooks`
         - `npm install -D eslint-config-prettier eslint-plugin-prettier`
      2. Create .eslintrc.cjs with:
         - TypeScript parser
         - React plugin with recommended rules
         - React hooks plugin
         - Prettier integration
         - React 19 specific rules (new hooks, etc.)
      3. Create .prettierrc with:
         - singleQuote: true
         - trailingComma: 'es5'
         - tabWidth: 2
         - semi: true
      4. Add .prettierignore for build outputs
      5. Add npm scripts:
         - "lint": "eslint src --ext ts,tsx"
         - "lint:fix": "eslint src --ext ts,tsx --fix"
         - "format": "prettier --write 'src/**/*.{ts,tsx,css}'"
         - "type-check": "tsc --noEmit"
      6. Run lint and fix any issues

      **Constraints:**
      - Use TypeScript ESLint parser (not Babel)
      - Enable React hooks rules (exhaustive deps, rules of hooks)
      - Integrate Prettier with ESLint (no conflicts)
      - Enforce consistent import order
      - Warn on console.log (error in production)

      **Testing Requirements:**
      - Run eslint on codebase (should pass or have fixable issues)
      - Run prettier on codebase (should format consistently)
      - Verify no rule conflicts between ESLint and Prettier
      - Type checking passes

      **Validation Commands:**
      - npm run lint (should complete without errors)
      - npm run format (should format files)
      - npm run type-check (should pass)

      **Success Criteria:**
      - ESLint configured with TypeScript and React rules
      - Prettier configured and integrated
      - npm scripts added for linting, formatting, type checking
      - All quality gates pass
      - No linting errors or TypeScript errors

