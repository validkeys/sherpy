milestone: m0
name: Clean Slate Setup & Migration Preparation
generated: 2026-04-28T00:00:00Z

style_anchor_refs:
  - feature-module-structure
  - shadcn-component-pattern
  - react-query-api-layer

global_constraints:
  allowed_patterns:
    - "TypeScript strict mode enabled with no implicit any"
    - "React 19 patterns with hooks and function components only"
    - "Bulletproof-react feature-based folder structure (features/, shared/, lib/)"
    - "Jotai atoms for client state, React Query for server state"
    - "Shadcn components with CVA variants and Radix UI primitives"
    - "Import aliases (@/ for src, feature-relative imports within features)"
    - "ESLint + Prettier for code quality and formatting"
    - "Vite for build tooling and dev server with HMR"

  forbidden_patterns:
    - "Class components or legacy React patterns"
    - "Prop drilling more than 2 levels (use context or atoms)"
    - "Direct API calls without React Query (no raw fetch in components)"
    - "Cross-feature imports (features must be independent)"
    - "Inline styles or CSS modules (use Tailwind only)"
    - "Any dependencies (useEffect, useState, etc)"
    - "Mutable state patterns (always immutable updates)"
    - "console.log in production code (use proper logging)"

  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task completion"

quality_gates:
  - stage: pre-task
    criteria:
      - "Development environment is functional (Node.js, npm available)"
      - "Git repository is clean (no uncommitted changes)"
      - "Previous task dependencies are completed"
      - "All required tools installed (TypeScript, Vite, etc.)"

  - stage: pre-commit
    commands:
      - npm run lint
      - npm run type-check
      - npm run test

  - stage: task-completion
    criteria:
      - "All tests passing with no failures or errors"
      - "No TypeScript errors or warnings"
      - "No ESLint errors (warnings acceptable if documented)"
      - "Code formatted with Prettier"
      - "Task-specific success criteria met"
      - "Documentation updated where necessary"

  - stage: milestone-completion
    criteria:
      - "All M0 tasks completed and committed"
      - "Dev server runs without errors (npm run dev)"
      - "Build completes successfully (npm run build)"
      - "project-structure.yaml created and referenced in CLAUDE.md"
      - "All dependencies installed and configured"
      - "Feature folder structure established"
      - "Basic routing and app shell functional"
      - "Comprehensive code review task completed"

  - stage: pre-push
    commands:
      - npm run test
      - npm run build
      - git fetch && git status

tasks:
  - id: m0-001
    name: "Preserve Existing Web Package as web-legacy"
    description: |
      Move the existing packages/web directory to packages/web-legacy to preserve
      all current code as reference material. This ensures no code is lost and
      provides a fallback during migration.
    estimate_minutes: 30
    type: config
    status: completed
    completed_at: "2026-04-29"
    dependencies: []
    files:
      create:
        - packages/web-legacy/.gitkeep
      modify:
        - .gitignore
    instructions: |
      **Objective:**
      Safely preserve existing web package by moving it to web-legacy.

      **Implementation Steps:**
      1. Verify packages/web exists and contains current application code
      2. Move packages/web to packages/web-legacy using: `git mv packages/web packages/web-legacy`
      3. Create packages/web-legacy/.gitkeep to ensure directory is tracked
      4. Update .gitignore if needed to ensure web-legacy is committed
      5. Verify move completed successfully

      **Constraints:**
      - Use git mv to preserve history
      - DO NOT delete any files
      - Verify all files moved successfully before proceeding

      **Validation Commands:**
      - ls -la packages/web-legacy/ (should show original files)
      - ls -la packages/web (should not exist yet)
      - git status (should show rename, not delete/add)

      **Success Criteria:**
      - packages/web-legacy exists with all original code
      - packages/web directory removed
      - Git history preserved for moved files
      - No files deleted or lost

  - id: m0-002
    name: "Create Fresh React 19 + Vite Project"
    description: |
      Initialize a new React 19 application using Vite as the build tool.
      This provides a clean foundation with modern tooling and no legacy
      configuration baggage.
    estimate_minutes: 45
    type: config
    status: completed
    completed_at: "2026-04-29"
    dependencies: [m0-001]
    files:
      create:
        - packages/web/package.json
        - packages/web/vite.config.ts
        - packages/web/tsconfig.json
        - packages/web/tsconfig.node.json
        - packages/web/index.html
        - packages/web/src/main.tsx
        - packages/web/src/App.tsx
        - packages/web/.gitignore
    instructions: |
      **Objective:**
      Create a fresh React 19 + Vite project with TypeScript strict mode.

      **Implementation Steps:**
      1. Navigate to packages/ directory
      2. Run: `npm create vite@latest web -- --template react-ts`
      3. Verify project created successfully
      4. Update tsconfig.json to enable strict mode:
         - "strict": true
         - "noImplicitAny": true
         - "strictNullChecks": true
         - "noUnusedLocals": true
         - "noUnusedParameters": true
      5. Update vite.config.ts to add path aliases:
         - Add resolve.alias for '@/' pointing to './src'
      6. Test dev server starts: `cd packages/web && npm install && npm run dev`
      7. Verify build works: `npm run build`

      **Constraints:**
      - Use React 19 (verify in package.json)
      - Use TypeScript strict mode (no exceptions)
      - Vite dev server must run on a configurable port
      - NEVER use JavaScript files (TypeScript only)

      **Testing Requirements:**
      - Dev server starts without errors
      - Build completes without errors
      - Type checking passes
      - Basic App.tsx renders in browser

      **Validation Commands:**
      - npm run dev (should start dev server)
      - npm run build (should complete successfully)
      - npm run preview (should serve built app)
      - tsc --noEmit (should have no errors)

      **Success Criteria:**
      - Fresh Vite + React 19 + TypeScript project created
      - Strict mode TypeScript configured
      - Path aliases configured for @/
      - Dev server and build working
      - No errors or warnings

  - id: m0-003
