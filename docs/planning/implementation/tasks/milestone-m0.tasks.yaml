    instructions: |
      **Objective:**
      Install and verify all core dependencies required for the UI refactor.

      **Implementation Steps:**
      1. Install state management:
         - `npm install jotai bunshi`
      2. Install data fetching:
         - `npm install @tanstack/react-query`
      3. Install chat integration:
         - `npm install @assistant-ui/react`
         - `npm install @assistant-ui/react-markdown` (for markdown rendering)
      4. Install UI utilities:
         - `npm install class-variance-authority clsx tailwind-merge`
         - `npm install @radix-ui/react-slot @radix-ui/react-tabs`
         - `npm install lucide-react` (icon library)
      5. Install dev dependencies:
         - `npm install -D @types/node`
      6. Verify all installations successful
      7. Run `npm install` to ensure lock file updated
      8. Test imports work by creating temporary test file

      **Constraints:**
      - Use exact versions compatible with React 19
      - Verify all peer dependencies satisfied
      - ONLY install dependencies listed above (no extras)
      - Use npm (not yarn or pnpm) for consistency

      **Testing Requirements:**
      - Create test file importing each library
      - Verify no peer dependency warnings
      - Type checking passes with new dependencies
      - No conflicting dependency versions

      **Validation Commands:**
      - npm list jotai bunshi @tanstack/react-query @assistant-ui/react
      - tsc --noEmit (verify types work)
      - npm run dev (verify dev server still works)

      **Success Criteria:**
      - All dependencies installed successfully
      - No peer dependency warnings or errors
      - package.json updated with all dependencies
      - package-lock.json committed
      - Type checking passes
      - Dev server starts with new dependencies

  - id: m0-004
