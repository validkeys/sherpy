    instructions: |
      **Objective:**
      Configure Tailwind CSS with proper design tokens and PostCSS integration.

      **Implementation Steps:**
      1. Install Tailwind: `npm install -D tailwindcss postcss autoprefixer`
      2. Initialize Tailwind: `npx tailwindcss init -p`
      3. Update tailwind.config.js:
         - Set content: ["./index.html", "./src/**/*.{js,ts,jsx,tsx}"]
         - Add theme.extend with design tokens (colors, spacing, etc.)
         - Add darkMode: "class" for dark mode support
      4. Create src/index.css with Tailwind directives:
         - @tailwind base;
         - @tailwind components;
         - @tailwind utilities;
      5. Import index.css in src/main.tsx
      6. Add CSS variables for shadcn theming in index.css
      7. Verify Tailwind classes work in App.tsx

      **Constraints:**
      - Use Tailwind 3.x (latest stable)
      - Configure for JIT mode (default in v3)
      - Include all content paths to avoid purging used classes
      - Add CSS variables for shadcn compatibility

      **Testing Requirements:**
