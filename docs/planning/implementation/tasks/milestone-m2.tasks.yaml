global_constraints:
  allowed_patterns:
    - "Use @assistant-ui/react Thread component for all chat UI"
    - "Use react-query three-part pattern (fetcher + queryOptions + hook) for all API calls"
    - "Use jotai atoms for client state (workflow state, tab selection, UI state)"
    - "Use feature-based structure (features/chat/, features/tabs/) with index.ts exports"
    - "Use WebSocket runtime from @assistant-ui/react for streaming"
    - "Use shadcn Tabs component for tabbed main area"
    - "Follow assistant-ui-integration pattern for chat implementation"
  forbidden_patterns:
    - "Custom WebSocket implementation (use @assistant-ui/react runtime)"
    - "Manual message state management (runtime handles it)"
    - "Cross-feature imports (features don't import from each other)"
    - "Server state in jotai atoms (use react-query for API data)"
    - "Direct fetch calls without react-query wrapper"
    - "Multiple WebSocket connections per session"
    - "Imperative DOM manipulation for streaming UI"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-task
    criteria:
      - M1 (Sidebar with Workflow Navigation) completed
      - Development environment running (npm run dev)
      - All M1 success criteria verified
      - Style anchors reviewed (assistant-ui-integration, feature-module-structure)
      - Branch up to date with main
  - stage: pre-commit
    commands:
      - npm run lint
      - npm run type-check
      - npm run test
  - stage: task-completion
    criteria:
      - All tests passing
      - No lint errors
      - No type errors
      - Code formatted with Prettier
      - Component documentation updated (JSDoc where appropriate)
      - Test coverage >70% for new code
      - Integration tests verify feature behavior
  - stage: milestone-completion
    criteria:
      - Tabbed main area renders with Chat and Files tabs
      - Chat tab displays @assistant-ui Thread component
      - WebSocket connection established with authentication
      - Skills auto-invoke when navigating workflow steps
      - Streaming AI responses display in real-time
      - Loading states and progress indicators working
      - Hybrid chat mode functional (guided + free-form)
      - Integration tests pass for skill invocation flow
      - Manual testing: complete workflow step with auto-skill
  - stage: pre-push
    commands:
      - npm run test
      - npm run build
      - git fetch origin main

