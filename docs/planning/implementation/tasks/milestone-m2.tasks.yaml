  - id: m2-008
    name: "Create useChatActions hook for programmatic control"
    description: |
      Implement custom hook for programmatic chat control including sending messages,
      clearing thread, and auto-invoking skills. Wraps @assistant-ui runtime methods
      for use in other features (like sidebar step navigation).
    estimate_minutes: 45
    type: code
    dependencies: [m2-005]
    files:
      create:
        - packages/web/src/features/chat/hooks/use-chat-actions.ts
      touch_only:
        - packages/web/src/features/chat/index.ts
    style_anchor_refs:
      - assistant-ui-integration
    instructions: |
      **Objective:**
      Create hook for programmatic chat control following assistant-ui patterns.

      **Implementation Steps:**
      1. Create `hooks/use-chat-actions.ts`
      2. Import `useAssistantRuntime` from '@assistant-ui/react'
      3. Define `useChatActions()` hook:
         - Get runtime via `useAssistantRuntime()`
         - Define `sendMessage(content: string)` function:
           - Calls `runtime.append({ role: 'user', content: [{ type: 'text', text: content }] })`
         - Define `sendSystemMessage(content: string)` function:
           - Calls `runtime.append({ role: 'system', content: [{ type: 'text', text: content }] })`
         - Define `clearThread()` function:
           - Calls `runtime.switchToNewThread()`
         - Return { sendMessage, sendSystemMessage, clearThread }
      4. Export from `features/chat/index.ts`
      5. Add JSDoc comments explaining usage

      **Constraints:**
      - ONLY use: @assistant-ui/react hooks and runtime methods
      - Follow pattern in **assistant-ui-integration** for programmatic control
      - NEVER use: Direct WebSocket send, custom message queue

      **Testing Requirements:**
      - Unit tests in next task (m2-009)

      **Success Criteria:**
      - useChatActions hook exports all three functions
      - sendMessage formats message correctly for runtime
      - TypeScript types are correct
      - Hook works within @assistant-ui runtime context

