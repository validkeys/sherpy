  - id: m2-018
    name: "Create react-query API integration for chat messages"
    description: |
      Implement react-query three-part pattern for fetching chat message history
      from API. Enables loading previous conversation when resuming project. Follows
      react-query-api-layer style anchor pattern.
    estimate_minutes: 60
    type: code
    dependencies: []
    files:
      create:
        - packages/web/src/features/chat/api/get-chat-messages.ts
        - packages/web/src/features/chat/api/send-chat-message.ts
        - packages/web/src/features/chat/types/index.ts
      touch_only:
        - packages/web/src/lib/api-client.ts
    style_anchor_refs:
      - react-query-api-layer
      - react-query-mutations
    instructions: |
      **Objective:**
      Create API layer for chat messages using react-query three-part pattern.

      **Implementation Steps:**
      1. Create `types/index.ts`:
         - Define ChatMessage type: id, projectId, role, content, createdAt
         - Export type
      2. Create `api/get-chat-messages.ts`:
         - Fetcher: `getChatMessages({ projectId, page }): Promise<{ data: ChatMessage[], meta }>`
         - Query options: `getChatMessagesQueryOptions(projectId, page)`
         - Hook: `useChatMessages({ projectId, page, queryConfig })`
         - Follow **react-query-api-layer** three-part pattern exactly
      3. Create `api/send-chat-message.ts`:
         - Mutation: `sendChatMessage({ projectId, content }): Promise<ChatMessage>`
         - Hook: `useSendChatMessage({ mutationConfig })`
         - Follow **react-query-mutations** pattern
         - Invalidate getChatMessagesQueryOptions on success

      **Constraints:**
      - ONLY use: @tanstack/react-query, three-part pattern
      - Follow pattern in **react-query-api-layer** for queries
      - Follow pattern in **react-query-mutations** for mutations
      - NEVER use: Direct fetch without react-query wrapper

      **Testing Requirements:**
      - Unit tests in next task (m2-019)

      **Success Criteria:**
      - Three-part pattern implemented for getChatMessages
      - Mutation pattern implemented for sendChatMessage
      - Query keys consistent and descriptive
      - TypeScript types strict
      - Cache invalidation on mutation success

