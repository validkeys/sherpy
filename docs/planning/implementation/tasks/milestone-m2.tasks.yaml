  - id: m2-003
    name: "Set up WebSocket configuration and auth"
    description: |
      Create WebSocket connection configuration with JWT authentication support.
      Establishes lib/websocket.ts with connection URL builder and auth token
      injection. Foundation for @assistant-ui/react runtime.
    estimate_minutes: 45
    type: code
    dependencies: []
    files:
      create:
        - packages/web/src/lib/websocket.ts
      touch_only:
        - packages/web/src/lib/api-client.ts
    style_anchor_refs:
      - assistant-ui-integration
    instructions: |
      **Objective:**
      Create WebSocket configuration utilities with authentication support.

      **Implementation Steps:**
      1. Create `lib/websocket.ts`
      2. Define `getWebSocketUrl()` function:
         - Reads VITE_WS_URL from environment (defaults to 'ws://localhost:3000/ws')
         - Returns formatted WebSocket URL
      3. Define `getAuthToken()` function:
         - Returns JWT token from localStorage or sessionStorage
         - Returns null if DEV_MODE enabled (bypass auth)
      4. Define `buildAuthenticatedWsUrl(projectId: string)` function:
         - Constructs WebSocket URL with query params: token and projectId
         - Format: `${wsUrl}?token=${token}&projectId=${projectId}`
         - Skip token param if DEV_MODE
      5. Export all functions

      **Constraints:**
      - ONLY use: Environment variables (VITE_*), localStorage for token
      - NEVER use: Hardcoded URLs, expose sensitive tokens in logs
      - Handle DEV_MODE bypass for local development

      **Testing Requirements:**
      - Unit tests in next task (m2-004)

      **Success Criteria:**
      - buildAuthenticatedWsUrl returns correct format
      - DEV_MODE bypasses token requirement
      - Functions are type-safe (TypeScript strict mode)
      - No hardcoded credentials or URLs

