milestones:
  - id: m0
    name: Foundation & Project Setup
    description: |
      Establish project foundation including build system, testing infrastructure,
      core abstractions, and development tooling. This milestone creates the
      scaffolding upon which all future features will be built.
    dependencies: []
    estimated_duration: 1 week
    tasks_file: milestone-m0.tasks.yaml
    success_criteria:
      - Project compiles successfully with TypeScript strict mode
      - Test infrastructure operational (vitest configured)
      - Linting and formatting configured and passing
      - Basic CLI can be invoked and shows help
      - All quality gates passing in CI
    deliverables:
      - Working development environment
      - CI/CD pipeline
      - Core type definitions
      - Basic CLI structure

  - id: m1
    name: Workflow Definition & Loading
    description: |
      Implement workflow definition schema and loading system. Users can define
      workflows in YAML format with tasks, dependencies, and configuration.
      The system validates workflow files and loads them into executable structures.
    dependencies: [m0]
    estimated_duration: 2 weeks
    tasks_file: milestone-m1.tasks.yaml
    success_criteria:
      - YAML workflow files can be parsed and validated
      - Schema validation catches invalid workflows with clear error messages
      - Workflow definitions can specify tasks and dependencies
      - Configuration merging works correctly (global + local)
      - All workflow loading code tested with >80% coverage
    deliverables:
      - Workflow schema definition
      - YAML parser and validator
      - Configuration management system
      - Workflow loading tests

  - id: m2
    name: Task Execution Engine
    description: |
      Build the core task execution engine. The engine executes tasks in
      dependency order, tracks progress, handles errors, and manages state.
      This is the heart of the automation system.
    dependencies: [m1]
    estimated_duration: 2 weeks
    tasks_file: milestone-m2.tasks.yaml
    success_criteria:
      - Tasks execute in correct dependency order
      - Progress tracking works for long-running workflows
      - Error handling stops execution and provides clear messages
      - State is persisted and can be inspected
      - Engine handles workflow interruption gracefully
    deliverables:
      - Task execution engine
      - State management system
      - Error handling and recovery
      - Progress tracking and logging

  - id: m3
    name: Built-in Task Library
    description: |
      Implement built-in task types for common operations: shell commands,
      file operations, git operations, and HTTP requests. These tasks form
      the foundation that users can compose into workflows.
    dependencies: [m2]
    estimated_duration: 2 weeks
    tasks_file: milestone-m3.tasks.yaml
    success_criteria:
      - Shell task executes commands and captures output
      - File tasks can read, write, copy, and delete files
      - Git tasks can perform common git operations
      - HTTP task can make requests and handle responses
      - All tasks have comprehensive test coverage
    deliverables:
      - Shell task implementation
      - File operation tasks
      - Git operation tasks
      - HTTP request task
      - Task documentation

  - id: m4
    name: CLI Interface & User Experience
    description: |
