      **Output Format:**
      Create code-reviews/2025-01-27-1-code-review.yaml with:
      ```yaml
      milestone: m1
      milestone_name: Workflow Definition & Loading
      review_date: 2025-01-27
      reviewer: claude-code

      summary:
        files_reviewed: 14
        issues_found: [count]
        critical_issues: [count]
        overall_quality: [excellent|good|fair|needs-improvement]

      style_anchor_compliance:
        - anchor: examples/workflow-schema.ts:1-50
          status: [compliant|partial|non-compliant]
          notes: |
            [Check if Schema.Class pattern is followed correctly]

        - anchor: examples/config-loader.ts:10-60
          status: [compliant|partial|non-compliant]
          notes: |
            [Check if Effect patterns are consistent]

        - anchor: test/workflow-loader.test.ts:1-40
          status: [compliant|partial|non-compliant]
          notes: |
            [Check if test patterns match]

      issues:
        # Example issue format:
        - severity: major
          category: architecture
          file: src/workflow/parser.ts:42
          description: |
            Using async/await instead of Effect.tryPromise pattern
          recommendation: |
            Change to Effect pattern:
            ```typescript
            // Current (incorrect):
            async parse(path: string) {
              const content = await fs.readFile(path)
            }

            // Should be:
            parse: (path: string) => Effect.gen(function* () {
              const content = yield* Effect.tryPromise(() => fs.readFile(path))
            })
            ```
          related_anchor: examples/config-loader.ts:15-20

      strengths:
        - Schema.Class pattern consistently applied in types.ts
        - Comprehensive test coverage for all services
