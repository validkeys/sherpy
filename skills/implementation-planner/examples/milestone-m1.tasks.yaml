        - src/workflow/types.test.ts
        - src/workflow/parser.ts
        - src/workflow/parser.test.ts
        - src/config/loader.ts
        - src/config/loader.test.ts
        - src/config/types.ts
        - src/workflow/validator.ts
        - src/workflow/validator.test.ts
        - src/workflow/loader.ts
        - src/workflow/loader.test.ts
        - docs/workflow-format.md
        - examples/basic-workflow.yaml
        - examples/advanced-workflow.yaml
        - README.md
    instructions: |
      **Objective:**
      Review all code, tests, and documentation created or modified during this milestone
      for quality, consistency, and alignment with project standards.

      **Review Checklist:**
      1. **Style Anchor Compliance:**
         - [ ] Code follows patterns defined in style anchors
         - [ ] Schema.Class pattern used consistently in types.ts
         - [ ] Effect.Service pattern used in all services
         - [ ] Testing follows @effect/vitest patterns from anchors
         - [ ] File structure matches established patterns

      2. **Code Quality:**
         - [ ] No type assertions (as) on external data
         - [ ] All service methods return Effect types
         - [ ] Proper error handling with Data.TaggedError
         - [ ] No any types used
         - [ ] Clear, meaningful names

      3. **Testing:**
         - [ ] All services have corresponding tests
         - [ ] Tests use it.effect pattern
         - [ ] Success and error cases covered
         - [ ] Test fixtures are appropriate

      4. **Architecture:**
         - [ ] Effect.Service used for dependency injection
         - [ ] Proper separation of concerns
         - [ ] No circular dependencies
