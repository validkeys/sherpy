milestone: m1
name: Workflow Definition & Loading
generated: "2025-01-27T14:00:00Z"

style_anchors:
  - path: examples/workflow-schema.ts
    lines: 1-50
    description: |
      Example of Schema.Class pattern for workflow definition:
      - Use Schema.Class for type-safe data structures
      - Include validation constraints (non-empty strings, valid IDs)
      - Add JSDoc comments with @example tags

  - path: examples/config-loader.ts
    lines: 10-60
    description: |
      Example of configuration loading with Effect:
      - Use Effect.tryPromise for async operations
      - Proper error handling with tagged errors
      - Schema validation for loaded data

  - path: test/workflow-loader.test.ts
    lines: 1-40
    description: |
      Example of testing with @effect/vitest:
      - Use it.effect for Effect-based tests
      - Provide necessary dependencies
      - Test both success and error cases

global_constraints:
  allowed_patterns:
    - "Use Schema.Class for all data validation and parsing"
    - "Use Effect.Service for all services with dependencies"
    - "Return Effect types from all service methods"
    - "Use Data.TaggedError for all custom errors"
  forbidden_patterns:
    - "NO type assertions (as) on external data"
    - "NO console.log - use Effect.log instead"
    - "NO direct async/await in service methods"
    - "NO any types"
  tdd_required: true
  max_task_duration_minutes: 150
  commit_strategy: "Commit after each task"

quality_gates:
  - stage: pre-commit
    commands:
      - npm run lint
      - npm run typecheck
      - npm test
  - stage: task-completion
    criteria:
      - All tests passing
      - No lint errors
      - No type errors
      - Code formatted with prettier

tasks:
  - id: m1-001
    name: Define workflow schema types
    description: |
      Create Schema.Class definitions for workflow, task, and configuration
      structures. These types form the foundation of the workflow system
      and will be used throughout the application.
    estimate_minutes: 90
    type: code
    dependencies: []
    files:
      create:
        - src/workflow/types.ts
        - src/workflow/types.test.ts
      touch_only: []
    instructions: |
      **Objective:**
      Define type-safe schemas for workflow definitions using Schema.Class.

      **Implementation Steps:**
      1. Create src/workflow/types.ts
      2. Define TaskSchema using Schema.Class:
         - id: string (non-empty)
         - name: string (non-empty)
         - type: literal union of task types
         - config: optional record
         - dependencies: optional array of task IDs
      3. Define WorkflowSchema using Schema.Class:
         - name: string (non-empty)
         - version: semver string pattern
         - tasks: array of TaskSchema
         - config: optional ConfigSchema
      4. Define ConfigSchema using Schema.Class:
         - variables: optional record
         - defaults: optional record
      5. Add JSDoc comments with @example for each schema

      **Constraints:**
      - ONLY use: Schema from "effect", Schema.Class pattern
      - Follow pattern in: examples/workflow-schema.ts:1-50
      - File scope: ONLY create types.ts, do not modify other files

      **TDD Checklist:**
      - [ ] Write test for TaskSchema validation
      - [ ] Implement TaskSchema
      - [ ] Write test for WorkflowSchema validation
      - [ ] Implement WorkflowSchema
      - [ ] Write test for ConfigSchema validation
      - [ ] Implement ConfigSchema
      - [ ] All tests passing

      **Validation:**
      ```bash
      npm test -- workflow/types.test.ts
      npm run typecheck
      ```
      Expected: All tests pass, no type errors

      **Drift Policy:**
      If you need to import anything besides Schema from "effect", STOP.
      Report the dependency and await guidance.

  - id: m1-002
    name: Implement workflow YAML parser
    description: |
      Create a parser that reads YAML workflow files and validates them
      against the workflow schema. The parser should return typed workflow
      objects or clear validation errors.
    estimate_minutes: 120
    type: code
    dependencies: [m1-001]
    files:
      create:
        - src/workflow/parser.ts
        - src/workflow/parser.test.ts
        - test/fixtures/valid-workflow.yaml
        - test/fixtures/invalid-workflow.yaml
      modify: []
    instructions: |
      **Objective:**
      Implement YAML parsing with schema validation using Effect patterns.

      **Implementation Steps:**
      1. Install yaml package: npm install yaml
      2. Create WorkflowParser service using Effect.Service
      3. Implement parse method:
         - Read file contents
         - Parse YAML to unknown
         - Validate against WorkflowSchema
         - Return Effect with typed workflow or ValidationError
      4. Define ParseError using Data.TaggedError
      5. Create test fixtures for valid and invalid workflows

      **Constraints:**
      - ONLY use: yaml, Schema, Effect, Data.TaggedError
      - Follow pattern in: examples/config-loader.ts:10-60
      - Use Effect.tryPromise for file reading
      - Use Schema.decodeUnknown for validation

      **TDD Checklist:**
      - [ ] Write test for valid workflow parsing
      - [ ] Implement parser
      - [ ] Write test for invalid workflow detection
      - [ ] Implement validation error handling
      - [ ] Write test for file not found error
      - [ ] Implement error case
      - [ ] All tests passing

      **Validation:**
      ```bash
      npm test -- workflow/parser.test.ts
      npm run lint
      npm run typecheck
      ```
      Expected: All tests pass, no errors

      **Drift Policy:**
      If you encounter async operations, use Effect.tryPromise.
      If you need any, STOP immediately.

  - id: m1-003
    name: Implement configuration loader
    description: |
      Build a configuration system that loads and merges configuration from
      multiple sources: global config, project config, and command-line
      overrides. Later sources override earlier ones.
    estimate_minutes: 120
    type: code
    dependencies: [m1-001]
    files:
      create:
        - src/config/loader.ts
        - src/config/loader.test.ts
        - src/config/types.ts
      modify: []
    instructions: |
      **Objective:**
      Implement layered configuration loading with merge capabilities.

      **Implementation Steps:**
      1. Define Config types in types.ts using Schema.Class
      2. Create ConfigLoader service using Effect.Service
      3. Implement load method that:
         - Loads global config from ~/.config/workflow-cli/config.yaml
         - Loads project config from .workflow/config.yaml
         - Merges configs (project overrides global)
         - Applies CLI overrides
         - Returns merged config or ConfigError
      4. Implement environment variable substitution
      5. Add caching to avoid repeated file reads

      **Constraints:**
      - ONLY use: yaml, Schema, Effect, FileSystem (from @effect/platform)
      - Follow pattern in: examples/config-loader.ts
      - Use Effect.gen for sequential operations
      - Return proper error types for each failure mode

      **TDD Checklist:**
      - [ ] Write test for global config loading
      - [ ] Implement global loader
      - [ ] Write test for project config loading
      - [ ] Implement project loader
      - [ ] Write test for config merging
      - [ ] Implement merge logic
      - [ ] Write test for env var substitution
      - [ ] Implement substitution
      - [ ] All tests passing

      **Validation:**
      ```bash
      npm test -- config/loader.test.ts
      npm run lint
      npm run typecheck
      ```
      Expected: All tests pass, no errors

  - id: m1-004
    name: Create workflow validator
    description: |
      Implement comprehensive workflow validation that checks for:
      circular dependencies, missing task references, invalid task types,
      and configuration errors. Provide clear, actionable error messages.
    estimate_minutes: 90
    type: code
    dependencies: [m1-001, m1-002]
    files:
      create:
        - src/workflow/validator.ts
        - src/workflow/validator.test.ts
      modify: []
    instructions: |
      **Objective:**
      Validate workflow definitions for structural and semantic correctness.

      **Implementation Steps:**
      1. Create WorkflowValidator service
      2. Implement validate method that checks:
         - All task IDs are unique
         - All dependencies reference existing tasks
         - No circular dependencies (use topological sort)
         - All task types are valid
         - Required configuration is present
      3. Define specific error types for each validation failure
      4. Return aggregated errors (not just first error)

      **Constraints:**
      - ONLY use: Effect, Data.TaggedError, Array methods
      - No external validation libraries
      - Clear error messages with task IDs and paths

      **TDD Checklist:**
      - [ ] Write test for unique task ID validation
      - [ ] Implement ID uniqueness check
      - [ ] Write test for dependency validation
      - [ ] Implement dependency existence check
      - [ ] Write test for circular dependency detection
      - [ ] Implement cycle detection
      - [ ] Write test for task type validation
      - [ ] Implement type checking
      - [ ] All tests passing

      **Validation:**
      ```bash
      npm test -- workflow/validator.test.ts
      npm run lint
      npm run typecheck
      ```
      Expected: All tests pass, no errors

  - id: m1-005
    name: Build workflow loader integration
    description: |
      Create an integrated WorkflowLoader service that combines parsing,
      validation, and configuration loading into a single cohesive API.
      This is the main entry point for loading workflows.
    estimate_minutes: 60
    type: code
    dependencies: [m1-002, m1-003, m1-004]
    files:
      create:
        - src/workflow/loader.ts
        - src/workflow/loader.test.ts
      modify: []
    instructions: |
      **Objective:**
      Integrate parser, validator, and config loader into unified API.

      **Implementation Steps:**
      1. Create WorkflowLoader service with dependencies:
         - WorkflowParser
         - WorkflowValidator
         - ConfigLoader
      2. Implement load method that:
         - Parses workflow file
         - Loads configuration
         - Validates workflow
         - Returns fully loaded and validated workflow
      3. Implement loadFromDirectory for discovering workflows
      4. Add workflow caching to avoid redundant loads

      **Constraints:**
      - ONLY use: Effect, Effect.Service, dependency injection
      - Follow service composition pattern
      - Handle errors from each service appropriately

      **TDD Checklist:**
      - [ ] Write integration test for successful workflow loading
      - [ ] Implement load method
      - [ ] Write test for handling parse errors
      - [ ] Implement error propagation
      - [ ] Write test for handling validation errors
      - [ ] Implement validation error handling
      - [ ] All tests passing

      **Validation:**
      ```bash
      npm test -- workflow/loader.test.ts
      npm test -- workflow/ # Run all workflow tests
      npm run lint
      npm run typecheck
      ```
      Expected: All tests pass, integration works

  - id: m1-006
    name: Add workflow documentation
    description: |
      Document the workflow definition format with examples, schema reference,
      and common patterns. Make it easy for users to understand and create
      workflows.
    estimate_minutes: 60
    type: docs
    dependencies: [m1-005]
    files:
      create:
        - docs/workflow-format.md
        - examples/basic-workflow.yaml
        - examples/advanced-workflow.yaml
      modify:
        - README.md
    instructions: |
      **Objective:**
      Create comprehensive workflow documentation.

      **Implementation Steps:**
      1. Create docs/workflow-format.md with:
         - Overview of workflow structure
         - Schema reference (task types, config options)
         - Examples from simple to complex
         - Common patterns and best practices
         - Troubleshooting section
      2. Create example workflows:
         - basic-workflow.yaml: Simple 3-task workflow
         - advanced-workflow.yaml: Complex workflow with dependencies
      3. Update README.md with:
         - Link to workflow documentation
         - Quick start example
         - Installation instructions

      **Constraints:**
      - Use clear, simple language
      - Include code examples with comments
      - Follow existing documentation style

      **TDD Checklist:**
      - [ ] Write workflow format overview
      - [ ] Document all schema fields
      - [ ] Create basic example
      - [ ] Create advanced example
      - [ ] Add troubleshooting section
      - [ ] Update README

      **Validation:**
      ```bash
      # Verify examples are valid
      npx ts-node scripts/validate-examples.ts
      # Check documentation builds
      npm run docs:build
      ```
      Expected: All examples valid, docs build successfully
